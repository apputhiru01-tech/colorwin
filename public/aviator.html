<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aviator — ColorWin</title>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--card:#1a1a28;--border:#252535;--text:#e8eaf0;--muted:#5a6280;--red:#ff3333;--green:#00c853;--accent:#4d88ff;--yellow:#ffcc00;--orange:#ff8c00;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* ── Header ── */
header{background:#0d0d15;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;z-index:20;}
.nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;}
.back-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#aaa;border-radius:8px;padding:5px 11px;font-size:17px;cursor:pointer;font-family:inherit;line-height:1;}
.nav-center{display:flex;align-items:center;gap:6px;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.2);border-radius:20px;padding:4px 12px;}
.nav-coin{font-size:18px;line-height:1;}
.nav-bal{font-size:13px;font-weight:800;color:var(--green);}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-plus{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:18px;font-weight:400;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;}
.nav-av{width:28px;height:28px;background:linear-gradient(135deg,#5b8fff,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;}

.brand-row{display:flex;align-items:center;justify-content:space-between;padding:5px 12px 8px;}
.brand-logo{font-size:20px;font-weight:900;font-style:italic;color:#ff2222;letter-spacing:-.5px;font-family:Georgia,serif;}
.help-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--muted);border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;display:inline-flex;align-items:center;justify-content:center;margin-left:5px;vertical-align:middle;}
.brand-bal-text{font-size:13px;font-weight:800;color:var(--green);}
.menu-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px;line-height:1;font-family:inherit;}

/* ── History bar ── */
.hist-bar{background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.05);padding:6px 10px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;align-items:center;}
.hist-bar::-webkit-scrollbar{display:none;}
.hc{flex-shrink:0;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.3px;}
.hc.x1{background:rgba(0,200,83,.12);color:#3cd488;border:1px solid rgba(0,200,83,.18);}
.hc.x2{background:rgba(40,120,255,.12);color:#5b8fff;border:1px solid rgba(40,120,255,.2);}
.hc.x5{background:rgba(155,89,255,.12);color:#a66eff;border:1px solid rgba(155,89,255,.2);}
.hc.x10{background:rgba(255,60,60,.12);color:#ff6868;border:1px solid rgba(255,60,60,.2);}
.hist-right{margin-left:auto;flex-shrink:0;display:flex;align-items:center;gap:4px;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 4px;border-radius:6px;}
.hist-right:hover{background:rgba(255,255,255,.05);}

/* ── Round info bar ── */
.round-bar{background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.04);padding:3px 12px;display:flex;justify-content:space-between;font-size:10px;color:var(--muted);flex-shrink:0;letter-spacing:.3px;}

/* ── Sky area ── */
.sky{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at 20% 80%,#0d1635 0%,#07090f 55%,#050608 100%);}
canvas#gc{position:absolute;inset:0;width:100%;height:100%;}
.star{position:absolute;background:#fff;border-radius:50%;pointer-events:none;}

/* ── Plane ── */
#planeEl{position:absolute;z-index:5;pointer-events:none;transition:left 0.09s linear,bottom 0.09s linear,transform 0.12s ease-out;filter:drop-shadow(0 0 10px rgba(255,50,50,.8));}
#planeEl svg{width:70px;height:44px;}
#planeEl.crashed{animation:planeCrash .5s ease-in forwards;}
@keyframes planeCrash{0%{opacity:1;transform:rotate(0) scale(1)}100%{opacity:0;transform:rotate(80deg) scale(.2)}}

/* ── Multiplier ── */
.mult-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);text-align:center;z-index:6;pointer-events:none;}
#multBig{font-size:68px;font-weight:900;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 40px currentColor;transition:color .2s;}
#multBig.c1{color:#00c853;}
#multBig.c2{color:#5b8fff;}
#multBig.c5{color:#a66eff;}
#multBig.c10{color:#ff6060;}
.mult-x{font-size:32px;opacity:.8;}
.mult-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}

/* ── Wait overlay ── */
#waitOv{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(7,9,15,.9);z-index:10;backdrop-filter:blur(3px);}
.wcd{font-size:80px;font-weight:900;color:var(--accent);text-shadow:0 0 30px var(--accent);animation:wPulse 1s ease-in-out infinite;}
@keyframes wPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.wlbl{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.wbets{font-size:11px;color:rgba(77,136,255,.6);margin-top:2px;}

/* ── Crash overlay ── */
#crashOv{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:10;}
#crashOv.show{display:flex;animation:cIn .3s ease;}
@keyframes cIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.crash-flew{font-size:30px;font-weight:900;color:var(--red);letter-spacing:2px;text-shadow:0 0 20px var(--red);}
.crash-at{font-size:52px;font-weight:900;color:#fff;}
.crash-next{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;}

/* ── Live cashout strip ── */
.live-strip{background:rgba(0,0,0,.5);border-top:1px solid rgba(255,255,255,.04);padding:4px 10px;min-height:26px;display:flex;gap:6px;overflow-x:auto;align-items:center;flex-shrink:0;}
.live-strip::-webkit-scrollbar{display:none;}
.li{flex-shrink:0;display:flex;align-items:center;gap:4px;background:rgba(0,200,83,.07);border:1px solid rgba(0,200,83,.12);border-radius:14px;padding:2px 8px;}
.li-u{font-size:10px;color:var(--muted);}
.li-m{font-size:10px;font-weight:800;color:var(--yellow);}
.li-w{font-size:10px;font-weight:800;color:var(--green);}

/* ── Live bets panel ── */
.bets-panel{background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.bp-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.bp-hdr-left{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.bp-hdr-right{font-size:10px;color:var(--muted);}
.bp-list{max-height:78px;overflow-y:auto;padding:2px 0;}
.bp-list::-webkit-scrollbar{width:2px;}
.bp-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.bp-row{display:flex;align-items:center;padding:3px 12px;gap:8px;}
.bp-user{font-size:11px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bp-bet{font-size:11px;font-weight:700;color:var(--text);width:56px;text-align:right;flex-shrink:0;}
.bp-status{font-size:11px;font-weight:800;width:80px;text-align:right;flex-shrink:0;}
.bp-status.flying{color:var(--yellow);}
.bp-status.won{color:var(--green);}
.bp-status.lost{color:var(--red);}
.bp-status.waiting{color:var(--muted);}

/* ── Bet panel ── */
.bet-panel{background:#111118;border-top:2px solid rgba(255,255,255,.07);padding:10px 12px 12px;flex-shrink:0;}

/* Tabs */
.bp-tabs{display:flex;gap:0;margin-bottom:10px;background:rgba(0,0,0,.5);border-radius:8px;padding:3px;}
.bpt{flex:1;background:none;border:none;border-radius:6px;color:rgba(255,255,255,.4);font-size:13px;font-weight:700;padding:7px;cursor:pointer;font-family:inherit;transition:all .15s;}
.bpt.active{background:#2a2a40;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.5);}

/* Bet row: left controls | right BET button */
.bet-row{display:flex;gap:8px;align-items:stretch;margin-bottom:8px;min-height:90px;}
.bet-left{flex:1;display:flex;flex-direction:column;gap:6px;}

/* Amount ctrl */
.amt-ctrl{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);border-radius:10px;padding:5px 8px;}
.adj-btn{width:32px;height:32px;border-radius:50%;background:#252535;border:1.5px solid rgba(255,255,255,.1);color:#fff;font-size:20px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1;transition:all .12s;}
.adj-btn:hover{background:rgba(77,136,255,.2);border-color:var(--accent);}
.amt-inp{flex:1;background:none;border:none;color:#fff;font-size:20px;font-weight:800;text-align:center;outline:none;font-family:inherit;width:0;}

/* 2×2 quick amounts */
.q22{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.qb{background:#1e1e30;border:1px solid rgba(255,255,255,.07);border-radius:7px;color:rgba(255,255,255,.45);font-size:12px;font-weight:700;padding:6px 4px;cursor:pointer;font-family:inherit;transition:all .12s;text-align:center;}
.qb:hover,.qb.sel{background:rgba(77,136,255,.1);border-color:var(--accent);color:var(--accent);}

/* BET / cashout button — right, full height */
.bet-right{width:44%;flex-shrink:0;display:flex;}
.bet-btn{flex:1;border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.3px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;}
.bet-btn.place{background:linear-gradient(170deg,#1fd44f,#00a835);box-shadow:0 4px 18px rgba(0,200,83,.35);}
.bet-btn.place:disabled{opacity:.4;cursor:not-allowed;}
.bet-btn.cashout{background:linear-gradient(170deg,#ff7c00,#e64000);animation:cashGlow 1s infinite;}
@keyframes cashGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,124,0,.4)}50%{box-shadow:0 0 0 10px rgba(255,124,0,0)}}
.bet-btn.waiting{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.3);cursor:not-allowed;}
.btn-sub{font-size:12px;font-weight:600;opacity:.85;display:block;margin-top:3px;letter-spacing:0;}

/* Auto controls row */
.auto-ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.a-side{display:flex;align-items:center;gap:5px;}
.a-lbl{font-size:11px;color:rgba(255,255,255,.35);font-weight:600;white-space:nowrap;}
.atog{width:28px;height:15px;background:rgba(255,255,255,.15);border-radius:8px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.atog.on{background:#00c853;}
.atog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.atog.on::after{left:15px;}
.ac-toggle{width:28px;height:15px;background:rgba(255,255,255,.15);border-radius:8px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.ac-toggle.on{background:#00c853;}
.ac-toggle::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.ac-toggle.on::after{left:15px;}
.ac-val{background:none;border:none;color:#fff;font-size:13px;font-weight:800;width:34px;text-align:center;outline:none;font-family:inherit;}
.ac-clear{background:none;border:none;color:rgba(255,255,255,.35);font-size:15px;cursor:pointer;padding:0;line-height:1;}

/* Auto content preset buttons */
.auto-preset-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(30px);background:rgba(18,18,28,.97);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;z-index:200;transition:all .3s;white-space:nowrap;pointer-events:none;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* Win Overlay */
#winOverlay{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);cursor:pointer;}
#winOverlay.show{display:flex;animation:wOvIn .35s ease;}
@keyframes wOvIn{from{opacity:0}to{opacity:1}}
@keyframes wOvOut{from{opacity:1}to{opacity:0}}
#winCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.win-center{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;}
.win-emoji{font-size:88px;display:block;animation:wBounce .7s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes wBounce{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.win-title{font-size:38px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#ffd84d,#ff8c42,#ff4d6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:wUp .5s .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes wUp{0%{transform:translateY(40px);opacity:0}100%{transform:translateY(0);opacity:1}}
.win-amount{font-size:64px;font-weight:900;color:#00d68f;text-shadow:0 0 40px rgba(0,214,143,.7),0 0 80px rgba(0,214,143,.3);animation:wPop .6s .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes wPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.win-label{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:3px;text-transform:uppercase;animation:wUp .5s .55s both;}
.win-stars{font-size:28px;animation:wSpin 1s .3s both;display:block;}
@keyframes wSpin{0%{transform:scale(0) rotate(-180deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.win-tap{font-size:12px;color:rgba(255,255,255,.28);margin-top:16px;animation:wFade 1s 2s both;letter-spacing:1px;}
@keyframes wFade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<header>
  <!-- Top nav row -->
  <div class="nav-row">
    <button class="back-btn" onclick="location.href='home.html'">‹</button>
    <div class="nav-center">
      <span class="nav-coin">🪙</span>
      <span class="nav-bal">₹<span id="walletAmt">0.00</span></span>
    </div>
    <div class="nav-right">
      <button class="nav-plus" onclick="location.href='home.html'">+</button>
      <div class="nav-av">🎮</div>
    </div>
  </div>
  <!-- Brand row -->
  <div class="brand-row">
    <div style="display:flex;align-items:center;">
      <span class="brand-logo">Aviator</span>
      <button class="help-btn" title="Bet before takeoff. Cashout before plane flies away!">?</button>
    </div>
    <span class="brand-bal-text" id="brandBal">0.00 INR</span>
    <button class="menu-btn">≡</button>
  </div>
</header>

<!-- History bar -->
<div class="hist-bar" id="histBar">
  <div class="hist-right">⏱ ▼</div>
</div>

<!-- Round info bar -->
<div class="round-bar">
  <span id="roundId">Round ID: —</span>
  <span>Ping: <span id="pingMs">—</span>ms</span>
</div>

<!-- Sky canvas -->
<div class="sky" id="sky">
  <canvas id="gc"></canvas>

  <!-- Plane -->
  <div id="planeEl" style="left:6%;bottom:14%;">
    <svg viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="38" cy="25" rx="28" ry="7" fill="#cc1111"/>
      <path d="M66,25 L78,22 L78,28 Z" fill="#ff3333"/>
      <path d="M26,25 L46,4 L52,22 Z" fill="#dd1c1c"/>
      <path d="M26,25 L46,46 L52,28 Z" fill="#dd1c1c"/>
      <path d="M10,25 L6,12 L18,22 Z" fill="#aa0f0f"/>
      <path d="M10,25 L6,38 L18,28 Z" fill="#aa0f0f"/>
      <ellipse cx="8" cy="25" rx="5" ry="3.5" fill="#ff7700" opacity=".9"/>
      <ellipse cx="8" cy="25" rx="2.5" ry="1.8" fill="#ffdd44"/>
      <ellipse cx="50" cy="21" rx="4" ry="3" fill="#c8e8ff" opacity=".65"/>
    </svg>
  </div>

  <!-- Multiplier display -->
  <div class="mult-wrap" id="multWrap" style="display:none;">
    <div id="multBig" class="c1">1.00<span class="mult-x">×</span></div>
    <div class="mult-sub" id="multSub">Flying…</div>
  </div>

  <!-- Wait overlay -->
  <div id="waitOv">
    <div class="wcd" id="wcd">8</div>
    <div class="wlbl">Next round</div>
    <div class="wbets">Place your bet now!</div>
  </div>

  <!-- Crash overlay -->
  <div id="crashOv">
    <div class="crash-flew">FLEW AWAY!</div>
    <div class="crash-at" id="crashAt">2.45×</div>
    <div class="crash-next" id="crashNext">Next round in 5s…</div>
  </div>
</div>

<!-- Live cashouts -->
<div class="live-strip" id="liveStrip">
  <span style="font-size:10px;color:var(--muted);">Cashouts appear here</span>
</div>

<!-- Live Bets Panel -->
<div class="bets-panel">
  <div class="bp-hdr">
    <span class="bp-hdr-left">Live Bets</span>
    <span class="bp-hdr-right" id="bpCount">0 players</span>
  </div>
  <div class="bp-list" id="bpList">
    <div style="padding:8px 12px;font-size:11px;color:var(--muted);text-align:center;">Waiting for bets…</div>
  </div>
</div>

<!-- Bet Panel -->
<div class="bet-panel">
  <!-- Tabs -->
  <div class="bp-tabs">
    <button class="bpt active" id="tabBet" onclick="switchTab('bet')">Bet</button>
    <button class="bpt" id="tabAuto" onclick="switchTab('auto')">Auto</button>
  </div>

  <!-- Bet content -->
  <div id="betContent">
    <!-- Horizontal: [left: amount + quick] [right: BET button] -->
    <div class="bet-row">
      <div class="bet-left">
        <!-- Amount control -->
        <div class="amt-ctrl">
          <button class="adj-btn" onclick="adjAmt(.5)">−</button>
          <input id="aviAmt" class="amt-inp" type="number" min="10" value="1000" oninput="syncBetAmt()"/>
          <button class="adj-btn" onclick="adjAmt(2)">+</button>
        </div>
        <!-- 2×2 quick amounts -->
        <div class="q22">
          <button class="qb" onclick="setA(100)">100</button>
          <button class="qb" onclick="setA(200)">200</button>
          <button class="qb" onclick="setA(500)">500</button>
          <button class="qb sel" onclick="setA(1000)">1,000</button>
        </div>
      </div>
      <!-- Right: tall BET button -->
      <div class="bet-right">
        <button class="bet-btn place" id="betBtn" onclick="doBet()">
          Bet<span class="btn-sub" id="btnSub">1,000.00 INR</span>
        </button>
      </div>
    </div>

    <!-- Auto bet + Auto Cash Out row -->
    <div class="auto-ctrl-row">
      <div class="a-side">
        <span class="a-lbl">Auto bet</span>
        <div class="atog" id="autoBetTog" onclick="this.classList.toggle('on')"></div>
      </div>
      <div class="a-side">
        <span class="a-lbl">Auto Cash Out</span>
        <div class="ac-toggle" id="acToggle" onclick="toggleAC()"></div>
        <input class="ac-val" id="acValInp" type="number" value="2.00" min="1.01" step="0.1"/>
        <button class="ac-clear" onclick="clearAC()">×</button>
      </div>
    </div>
  </div>

  <!-- Auto tab content -->
  <div id="autoContent" style="display:none;">
    <div style="font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Auto cashout at multiplier:</div>
    <div class="auto-preset-grid">
      <button class="qb" onclick="setAC(1.2);switchTab('bet')">1.2×</button>
      <button class="qb" onclick="setAC(1.5);switchTab('bet')">1.5×</button>
      <button class="qb" onclick="setAC(2.0);switchTab('bet')">2×</button>
      <button class="qb" onclick="setAC(3.0);switchTab('bet')">3×</button>
      <button class="qb" onclick="setAC(5.0);switchTab('bet')">5×</button>
      <button class="qb" onclick="setAC(10.0);switchTab('bet')">10×</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const API='', token=localStorage.getItem('cw_token');
if(!token) location.href='login.html';

let wallet=0, phase='waiting', curMult=1.00, myBet=null, graphPts=[];
let autoCashMult=0, liveBets=[], roundSpeedFactor=0.04;
let _pingStart=0;

/* ── Tab switch ── */
function switchTab(tab){
  document.getElementById('tabBet').classList.toggle('active',tab==='bet');
  document.getElementById('tabAuto').classList.toggle('active',tab==='auto');
  document.getElementById('betContent').style.display=tab==='bet'?'':'none';
  document.getElementById('autoContent').style.display=tab==='auto'?'':'none';
}

/* ── Auto cashout toggle ── */
function toggleAC(){
  const tog=document.getElementById('acToggle');
  if(tog.classList.contains('on')){
    setAC(0);
  } else {
    const val=parseFloat(document.getElementById('acValInp').value)||2;
    setAC(val>1?val:2);
  }
}
function clearAC(){setAC(0);}

/* ── Sync bet amount label ── */
function syncBetAmt(){
  const v=parseFloat(document.getElementById('aviAmt').value)||0;
  const sub=document.getElementById('btnSub');
  if(sub&&document.getElementById('betBtn').classList.contains('place')){
    sub.textContent=v.toFixed(2)+' INR';
  }
}

/* ── Bot players ── */
const BN=['rahul','priya','vikram','ankit','neha','sunny','raj','pooja','amit','riya','sachin','kavya','dev','simran','karan','rohit','divya','sonu','meena','arjun','preeti','nikhil','sonam','vivek','tanya','harsh','swati','deepak','nisha','vishal','shruti','mohit','rekha','gaurav','anjali','aditya','smita','ravi','komal','suresh','mansi','ajay','pallavi','piyush','isha','sandeep','ridhi','vinay','ruhi','prakash','tina','abhishek','seema','lokesh','sneha','kunal','pinki','tarun','radha','siddharth'];
const BA=[500,800,1000,1500,2000,2000,3000,5000,5000,8000,10000,10000,15000,20000,25000,50000,75000,100000];
let botAddTimer=null, totalBotCount=0;

function mkBots(){
  totalBotCount=500+Math.floor(Math.random()*350);
  const visible=22+Math.floor(Math.random()*8);
  const bots=[];
  const used=new Set();
  for(let i=0;i<visible;i++){
    let name;
    do{name=BN[Math.floor(Math.random()*BN.length)]+(Math.floor(Math.random()*9000)+100);}while(used.has(name));
    used.add(name);
    const amt=BA[Math.floor(Math.random()*BA.length)];
    const r=Math.random();
    const ac=r<0.70?parseFloat(r<0.35?(1.2+Math.random()*1.3):(2.5+Math.random()*5.5)).toFixed(2)*1:0;
    bots.push({username:name,amount:amt,autoCashout:ac,status:'waiting',isBot:true});
  }
  return bots;
}

function startBotJoin(){
  clearInterval(botAddTimer);
  liveBets=[];
  const bots=mkBots();
  let i=0;
  botAddTimer=setInterval(()=>{
    if(i>=bots.length||phase!=='waiting'){clearInterval(botAddTimer);return;}
    const count=Math.min(3+Math.floor(Math.random()*4),bots.length-i);
    for(let c=0;c<count;c++) liveBets.unshift(bots[i++]);
    renderBets();
  },200);
}

function processBotTick(m){
  liveBets.forEach(b=>{
    if(b.isBot&&b.status==='flying'&&b.autoCashout>0&&m>=b.autoCashout){
      b.status='won'; b.mult=b.autoCashout; b.win=parseFloat((b.amount*b.autoCashout).toFixed(0));
    }
  });
}

/* ── Auto cashout ── */
function setAC(v){
  autoCashMult=v;
  const tog=document.getElementById('acToggle');
  const inp=document.getElementById('acValInp');
  if(v>0){tog.classList.add('on');inp.value=v;}
  else{tog.classList.remove('on');}
}

/* ── Live bets ── */
function renderBets(){
  const list=document.getElementById('bpList');
  const total=totalBotCount+(myBet?1:0);
  document.getElementById('bpCount').textContent=fmt(total)+' players';
  if(!liveBets.length&&!myBet){list.innerHTML='<div style="padding:8px 12px;font-size:11px;color:var(--muted);text-align:center;">Waiting for bets…</div>';return;}
  const order={won:0,flying:1,waiting:2,lost:3};
  const sorted=[...liveBets].sort((a,b)=>(order[a.status]||2)-(order[b.status]||2));
  list.innerHTML=sorted.map(b=>{
    let statusHtml='',cls='';
    if(b.status==='won'){
      const bigWin=b.win>=10000;
      cls='won'; statusHtml=`✅ ${b.mult}× <b style="font-size:${bigWin?'13px':'12px'};color:${bigWin?'#00ff88':'#00c853'}">+₹${fmt(b.win)}</b>`;
    } else if(b.status==='lost'){
      cls='lost'; statusHtml=`❌ Lost ₹${fmt(b.amount)}`;
    } else if(b.status==='flying'){
      const live=Math.floor(b.amount*curMult);
      cls='flying'; statusHtml=`✈ <b>₹${fmt(live)}</b>`;
    } else {
      cls='waiting'; statusHtml='⏳';
    }
    return `<div class="bp-row"><span class="bp-user">@${b.username}</span><span class="bp-bet">₹${fmt(b.amount)}</span><span class="bp-status ${cls}">${statusHtml}</span></div>`;
  }).join('');
}
function fmt(n){return Number(n).toLocaleString('en-IN');}

/* Canvas */
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const sky=document.getElementById('sky');

function resize(){canvas.width=sky.offsetWidth;canvas.height=sky.offsetHeight;}
resize(); window.addEventListener('resize',resize);

/* Stars */
for(let i=0;i<55;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*.6+.2};animation:tw ${Math.random()*4+2}s ${Math.random()*3}s infinite;`;
  sky.appendChild(s);
}
const ss=document.createElement('style');
ss.textContent='@keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}';
document.head.appendChild(ss);

/* Graph */
function drawGraph(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(graphPts.length<2) return;
  const pad={l:30,r:20,t:24,b:28};
  const maxM=Math.max(...graphPts,2);
  const pts=graphPts;

  function px(i){return pad.l+(i/(pts.length-1))*(W-pad.l-pad.r);}
  function py(m){return H-pad.b-((m-1)/(maxM-1||1))*(H-pad.t-pad.b);}

  const crashed=phase==='crashed';
  const lineColor=crashed?'#ff4444':'#ff4444';
  const fillColor0=crashed?'rgba(255,60,60,.28)':'rgba(255,68,68,.22)';
  const fillColor1=crashed?'rgba(255,60,60,.02)':'rgba(255,68,68,.02)';

  const g=ctx.createLinearGradient(0,py(maxM),0,H-pad.b);
  g.addColorStop(0,fillColor0);
  g.addColorStop(1,fillColor1);
  ctx.beginPath();
  ctx.moveTo(px(0),py(pts[0]));
  for(let i=1;i<pts.length;i++){
    const mx=(px(i-1)+px(i))/2;
    ctx.quadraticCurveTo(px(i-1),py(pts[i-1]),mx,(py(pts[i-1])+py(pts[i]))/2);
  }
  ctx.lineTo(px(pts.length-1),py(pts[pts.length-1]));
  ctx.lineTo(px(pts.length-1),H-pad.b);
  ctx.lineTo(px(0),H-pad.b);
  ctx.closePath();
  ctx.fillStyle=g; ctx.fill();

  ctx.beginPath();
  ctx.moveTo(px(0),py(pts[0]));
  for(let i=1;i<pts.length;i++){
    const mx=(px(i-1)+px(i))/2;
    ctx.quadraticCurveTo(px(i-1),py(pts[i-1]),mx,(py(pts[i-1])+py(pts[i]))/2);
  }
  ctx.strokeStyle=lineColor;
  ctx.lineWidth=2.5; ctx.shadowColor=lineColor; ctx.shadowBlur=8;
  ctx.stroke(); ctx.shadowBlur=0;

  if(pts.length>0&&phase==='flying'){
    const lx=px(pts.length-1), ly=py(pts[pts.length-1]);
    const W2=sky.offsetWidth, H2=sky.offsetHeight;
    const plane=document.getElementById('planeEl');
    plane.style.left=((lx/W2)*100-3)+'%';
    plane.style.bottom=(((H2-ly)/H2)*100-2)+'%';
    if(pts.length>3){
      const ang=Math.atan2(py(pts[pts.length-4])-ly, px(pts.length-1)-px(pts.length-4))*180/Math.PI;
      plane.style.transform=`rotate(${-Math.min(ang,40)}deg)`;
    }
  }
}

/* Phase helpers */
function setWait(cd){
  phase='waiting'; graphPts=[]; curMult=1.00;
  startBotJoin();
  document.getElementById('waitOv').style.display='flex';
  document.getElementById('multWrap').style.display='none';
  document.getElementById('crashOv').classList.remove('show');
  document.getElementById('wcd').textContent=cd;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const plane=document.getElementById('planeEl');
  plane.className=''; plane.style.left='6%'; plane.style.bottom='14%'; plane.style.transform=''; plane.style.opacity='1';
  if(!myBet){
    const btn=document.getElementById('betBtn');
    btn.className='bet-btn place';
    const amt=parseFloat(document.getElementById('aviAmt').value)||1000;
    btn.innerHTML='BET<span class="btn-sub" id="btnSub">'+amt.toFixed(2)+' INR</span>';
    btn.disabled=false;
    btn.onclick=doBet;
  }
}

function setFlying(){
  phase='flying'; graphPts=[1.00];
  clearInterval(botAddTimer);
  liveBets.forEach(b=>{if(b.status==='waiting') b.status='flying';});
  renderBets();
  document.getElementById('waitOv').style.display='none';
  document.getElementById('multWrap').style.display='block';
  document.getElementById('crashOv').classList.remove('show');
  setMultColor(1.00);
  if(myBet&&!myBet.cashedOut){
    const btn=document.getElementById('betBtn');
    btn.className='bet-btn cashout';
    btn.innerHTML='CASHOUT<span class="btn-sub" id="btnSub">₹'+myBet.amount+' → tap to secure</span>';
    btn.disabled=false;
    btn.onclick=doCashout;
  } else if(!myBet){
    const btn=document.getElementById('betBtn');
    btn.className='bet-btn waiting';
    btn.innerHTML='Missed<span class="btn-sub">Bet next round</span>';
    btn.disabled=true;
  }
}

function setTick(m){
  curMult=m; graphPts.push(m);
  if(graphPts.length>150) graphPts=graphPts.slice(-150);
  document.getElementById('multBig').innerHTML=m.toFixed(2)+'<span class="mult-x">×</span>';
  setMultColor(m);
  drawGraph();
  if(myBet&&!myBet.cashedOut){
    const win=(myBet.amount*m).toFixed(2);
    const sub=document.getElementById('btnSub');
    if(sub) sub.textContent='₹'+win+' → tap to cashout';
    if(autoCashMult>0&&m>=autoCashMult) doCashout();
  }
  processBotTick(m);
  renderBets();
}

function setMultColor(m){
  const el=document.getElementById('multBig');
  el.className=m<2?'c1':m<5?'c2':m<10?'c5':'c10';
  el.style.textShadow='0 0 40px currentColor';
}

function setCrash(at){
  phase='crashed'; graphPts.push(at); drawGraph();
  liveBets.forEach(b=>{
    if(b.status==='flying'){
      if(b.isBot&&Math.random()<0.18){b.status='won';b.mult=parseFloat((at*0.92+Math.random()*0.07).toFixed(2));b.win=Math.floor(b.amount*b.mult);}
      else b.status='lost';
    }
  });
  renderBets();
  document.getElementById('crashAt').textContent=at+'×';
  document.getElementById('crashOv').classList.add('show');
  document.getElementById('multWrap').style.display='none';
  document.getElementById('planeEl').classList.add('crashed');
  if(myBet&&!myBet.cashedOut){
    const btn=document.getElementById('betBtn');
    btn.className='bet-btn waiting';
    btn.innerHTML='Lost ₹'+myBet.amount+'<span class="btn-sub">Crashed at '+at+'×</span>';
    btn.disabled=true;
    myBet=null;
  }
}

/* Bet helpers */
function setA(v){
  document.getElementById('aviAmt').value=v;
  document.querySelectorAll('.qb').forEach(b=>{
    const t=parseFloat(b.textContent.replace(',',''));
    b.classList.toggle('sel',t===v);
  });
  syncBetAmt();
}
function adjAmt(f){
  const inp=document.getElementById('aviAmt');
  inp.value=Math.max(10,Math.round(parseFloat(inp.value||1000)*f));
  syncBetAmt();
}

function updateWallet(v){
  wallet=v;
  const fmt2=parseFloat(v).toFixed(2);
  document.getElementById('walletAmt').textContent=fmt2;
  document.getElementById('brandBal').textContent=fmt2+' INR';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

/* History chip */
function addChip(at){
  const bar=document.getElementById('histBar');
  const cls=at<2?'x1':at<5?'x2':at<10?'x5':'x10';
  const c=document.createElement('span');
  c.className='hc '+cls;
  c.textContent=at+'×';
  const right=bar.querySelector('.hist-right');
  right?bar.insertBefore(c,right):bar.appendChild(c);
  const chips=bar.querySelectorAll('.hc');
  if(chips.length>12) chips[chips.length-1].remove();
}

/* Live cashout */
function addLive(d){
  const strip=document.getElementById('liveStrip');
  if(strip.children.length===1&&strip.children[0].tagName==='SPAN') strip.innerHTML='';
  const el=document.createElement('div');
  el.className='li';
  el.innerHTML=`<span class="li-u">@${d.username}</span><span class="li-m">${d.mult}×</span><span class="li-w">+₹${d.win}</span>`;
  strip.insertBefore(el,strip.firstChild);
  while(strip.children.length>8) strip.removeChild(strip.lastChild);
}

/* API calls */
async function doBet(){
  if(phase!=='waiting'){showToast('Wait for next round');return;}
  const amt=parseFloat(document.getElementById('aviAmt').value);
  if(!amt||amt<10){showToast('Min bet ₹10');return;}
  if(amt>wallet){showToast('Insufficient balance');return;}
  const btn=document.getElementById('betBtn');
  btn.disabled=true;
  btn.innerHTML='Placing…<span class="btn-sub"></span>';
  try{
    const r=await fetch(API+'/api/aviator/bet',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({amount:amt})});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;btn.innerHTML='BET<span class="btn-sub">'+amt.toFixed(2)+' INR</span>';return;}
    myBet={amount:amt,cashedOut:false};
    updateWallet(d.newBalance);
    btn.className='bet-btn waiting';
    btn.innerHTML='Bet Placed ✓<span class="btn-sub">₹'+amt+' — flying soon…</span>';
    btn.disabled=true; btn.onclick=null;
    showToast('✈️ Bet placed! ₹'+amt);
  }catch{showToast('Error');btn.disabled=false;btn.innerHTML='BET<span class="btn-sub">'+parseFloat(document.getElementById('aviAmt').value||1000).toFixed(2)+' INR</span>';}
}

async function doCashout(){
  if(phase!=='flying'||!myBet||myBet.cashedOut) return;
  const btn=document.getElementById('betBtn');
  btn.disabled=true;
  try{
    const r=await fetch(API+'/api/aviator/cashout',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;return;}
    myBet.cashedOut=true;
    updateWallet(d.newBalance);
    btn.className='bet-btn waiting';
    btn.innerHTML='Cashed ✓ +₹'+d.win+'<span class="btn-sub">'+d.multiplier+'× — great call!</span>';
    showToast('🎉 Cashed at '+d.multiplier+'×! +₹'+d.win);
    showWinAnimation(d.win, 'Aviator Win!');
  }catch{showToast('Error');btn.disabled=false;}
}

/* Init */
async function init(){
  try{
    const r=await fetch(API+'/api/auth/me',{headers:{Authorization:'Bearer '+token}});
    if(!r.ok){localStorage.removeItem('cw_token');location.href='login.html';return;}
    updateWallet((await r.json()).user.wallet);
  }catch{}
  try{
    const r=await fetch(API+'/api/aviator/state',{headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    d.history?.forEach(h=>addChip(h));
    if(d.liveBets) liveBets=d.liveBets.map(b=>({...b,status:d.phase==='flying'?(b.cashedOut?'won':'flying'):'waiting'}));
    if(d.phase==='waiting') setWait(d.countdown||8);
    else if(d.phase==='flying'){roundSpeedFactor=d.speedFactor||0.04;setFlying();if(d.multiplier) setTick(d.multiplier);}
    else setCrash(d.multiplier||1);
    if(d.roundId) document.getElementById('roundId').textContent='Round ID: '+d.roundId;
  }catch{}
}

/* Socket */
const socket=io();
let _pingInterval=setInterval(()=>{_pingStart=Date.now();socket.emit('ping');},3000);
socket.on('pong',()=>{document.getElementById('pingMs').textContent=Date.now()-_pingStart;});
socket.on('avi:wait',d=>{myBet=null;setWait(d.countdown||8);d.history?.forEach(h=>addChip(h));if(d.roundId)document.getElementById('roundId').textContent='Round ID: '+d.roundId;});
socket.on('avi:cd',d=>{if(phase==='waiting') document.getElementById('wcd').textContent=d.countdown;});
socket.on('avi:fly',d=>{roundSpeedFactor=d?.speedFactor||0.04;setFlying();});
socket.on('avi:tick',d=>setTick(d.multiplier));
socket.on('avi:crash',d=>{setCrash(d.at);addChip(d.at);});
socket.on('avi:cashout_pub',d=>{
  addLive(d);
  const b=liveBets.find(x=>x.username===d.username);
  if(b){b.status='won';b.mult=d.mult;b.win=d.win;renderBets();}
});
socket.on('avi:bet_placed',d=>{
  if(!liveBets.find(b=>b.username===d.username))
    liveBets.unshift({username:d.username,amount:d.amount,status:'waiting'});
  renderBets();
});
socket.on('wallet:update',d=>updateWallet(d.wallet));

init();

// ── Win Animation ──
let _confettiFrame=null;
const _confettiColors=['#ffd84d','#ff4d6a','#5b8fff','#00d68f','#9b59ff','#ff8c42','#fff','#ff69b4'];
function showWinAnimation(amount,label){
  let ov=document.getElementById('winOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='winOverlay';
    ov.innerHTML=`<canvas id="winCanvas"></canvas><div class="win-center"><span class="win-emoji">🎉</span><div class="win-title">CONGRATULATIONS!</div><div class="win-amount" id="winAmt">+₹0</div><div class="win-label" id="winLbl">Amazing win!</div><span class="win-stars">⭐✨⭐</span><div class="win-tap">Tap anywhere to continue</div></div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click',hideWinAnimation);
  }
  document.getElementById('winAmt').textContent='+₹'+parseFloat(amount).toFixed(2);
  document.getElementById('winLbl').textContent=label||'Amazing win!';
  ov.classList.add('show');
  _startConfetti();
  clearTimeout(ov._t);
  ov._t=setTimeout(hideWinAnimation,5000);
}
function hideWinAnimation(){
  const ov=document.getElementById('winOverlay');
  if(!ov||!ov.classList.contains('show'))return;
  ov.style.animation='wOvOut .3s ease forwards';
  setTimeout(()=>{ov.classList.remove('show');ov.style.animation='';},300);
  _stopConfetti();
}
function _startConfetti(){
  const canvas=document.getElementById('winCanvas');if(!canvas)return;
  const ctx2=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=[];
  for(let i=0;i<150;i++){pieces.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,w:7+Math.random()*10,h:4+Math.random()*6,color:_confettiColors[Math.floor(Math.random()*_confettiColors.length)],speed:2+Math.random()*5,angle:Math.random()*360,spin:(Math.random()-.5)*10,swingA:Math.random()*Math.PI*2,swingS:0.02+Math.random()*.04,swing:Math.random()*3-1.5});}
  function draw(){ctx2.clearRect(0,0,canvas.width,canvas.height);let alive=false;pieces.forEach(p=>{p.y+=p.speed;p.angle+=p.spin;p.swingA+=p.swingS;p.x+=Math.sin(p.swingA)*p.swing;if(p.y<canvas.height+30)alive=true;ctx2.save();ctx2.translate(p.x,p.y);ctx2.rotate(p.angle*Math.PI/180);ctx2.fillStyle=p.color;ctx2.globalAlpha=Math.max(0,1-(p.y/canvas.height)*.4);ctx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx2.restore();});if(alive)_confettiFrame=requestAnimationFrame(draw);}
  cancelAnimationFrame(_confettiFrame);_confettiFrame=requestAnimationFrame(draw);
}
function _stopConfetti(){cancelAnimationFrame(_confettiFrame);const c=document.getElementById('winCanvas');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);}
</script>
