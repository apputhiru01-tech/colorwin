<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aviator — ColorWin</title>
<style>
:root{--bg:#0b0e1a;--surface:#111827;--card:#1a2235;--border:#2a3555;--text:#e8eaf0;--muted:#5a6280;--red:#ff4444;--green:#00c853;--accent:#4d88ff;--yellow:#ffcc00;--orange:#ff8c00;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* ── Header ── */
header{background:rgba(10,13,26,.95);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:20;backdrop-filter:blur(10px);}
.logo{font-size:15px;font-weight:900;letter-spacing:.5px;color:#fff;}
.logo em{color:var(--red);font-style:normal;}
.back-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;}
.wallet-pill{background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.25);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:800;color:var(--green);}

/* ── History bar ── */
.hist-bar{background:rgba(0,0,0,.5);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;}
.hist-bar::-webkit-scrollbar{display:none;}
.hc{flex-shrink:0;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.3px;}
.hc.x1{background:rgba(0,200,83,.15);color:#00c853;border:1px solid rgba(0,200,83,.2);}
.hc.x2{background:rgba(0,140,255,.12);color:#409eff;border:1px solid rgba(0,140,255,.18);}
.hc.x5{background:rgba(155,89,255,.15);color:#a66eff;border:1px solid rgba(155,89,255,.2);}
.hc.x10{background:rgba(255,60,60,.15);color:#ff6060;border:1px solid rgba(255,60,60,.2);}

/* ── Sky area ── */
.sky{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at 20% 80%,#0d1635 0%,#07090f 55%,#050608 100%);}
canvas#gc{position:absolute;inset:0;width:100%;height:100%;}

/* Stars */
.star{position:absolute;background:#fff;border-radius:50%;pointer-events:none;}

/* ── Plane ── */
#planeEl{position:absolute;z-index:5;pointer-events:none;transition:none;filter:drop-shadow(0 0 10px rgba(255,60,60,.7));}
#planeEl svg{width:70px;height:44px;}
#planeEl.crashed{animation:planeCrash .5s ease-in forwards;}
@keyframes planeCrash{0%{opacity:1;transform:rotate(0) scale(1)}100%{opacity:0;transform:rotate(80deg) scale(.2)}}

/* ── Multiplier ── */
.mult-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);text-align:center;z-index:6;pointer-events:none;}
#multBig{font-size:68px;font-weight:900;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 40px currentColor;transition:color .2s;}
#multBig.c1{color:#00c853;}
#multBig.c2{color:#00aaff;}
#multBig.c5{color:#a66eff;}
#multBig.c10{color:#ff6060;}
.mult-x{font-size:32px;opacity:.8;}
.mult-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}

/* ── Wait overlay ── */
#waitOv{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(7,9,15,.88);z-index:10;backdrop-filter:blur(3px);}
.wcd{font-size:80px;font-weight:900;color:var(--accent);text-shadow:0 0 30px var(--accent);animation:wPulse 1s ease-in-out infinite;}
@keyframes wPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.wlbl{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.wbets{font-size:11px;color:rgba(77,136,255,.6);margin-top:2px;}

/* ── Crash overlay ── */
#crashOv{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:10;}
#crashOv.show{display:flex;animation:cIn .3s ease;}
@keyframes cIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.crash-flew{font-size:30px;font-weight:900;color:var(--red);letter-spacing:2px;text-shadow:0 0 20px var(--red);}
.crash-at{font-size:52px;font-weight:900;color:#fff;}
.crash-next{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;}

/* ── Live cashout strip ── */
.live-strip{background:rgba(0,0,0,.6);border-top:1px solid var(--border);padding:5px 12px;min-height:30px;display:flex;gap:8px;overflow-x:auto;align-items:center;flex-shrink:0;}
.live-strip::-webkit-scrollbar{display:none;}
.li{flex-shrink:0;display:flex;align-items:center;gap:5px;background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.15);border-radius:20px;padding:3px 10px;}
.li-u{font-size:11px;color:var(--muted);}
.li-m{font-size:11px;font-weight:800;color:var(--yellow);}
.li-w{font-size:11px;font-weight:800;color:var(--green);}

/* ── Bet panel ── */
.bet-panel{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0;}

/* Auto-bet toggle row */
.abrow{display:flex;gap:6px;margin-bottom:8px;}
.abtab{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-weight:700;padding:6px 4px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.abtab.on{background:rgba(77,136,255,.12);border-color:var(--accent);color:var(--accent);}

/* Amount row */
.amt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.aqb{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:700;padding:7px 4px;cursor:pointer;font-family:inherit;text-align:center;transition:all .12s;}
.aqb.sel{background:rgba(77,136,255,.15);border-color:var(--accent);color:var(--accent);}
.aqb:hover{border-color:var(--accent);}

.inp-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
.a-inp{background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:17px;font-weight:800;padding:10px 12px;outline:none;flex:1;font-family:inherit;}
.a-inp:focus{border-color:var(--accent);}
.adj{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-weight:700;padding:9px 10px;cursor:pointer;font-family:inherit;}
.adj:hover{border-color:var(--accent);color:var(--accent);}

/* Bet / cashout button */
.bet-btn{width:100%;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:900;padding:13px;cursor:pointer;font-family:inherit;transition:all .15s;position:relative;overflow:hidden;}
.bet-btn.place{background:linear-gradient(135deg,#ff5722,#e64000);}
.bet-btn.place:disabled{opacity:.4;cursor:not-allowed;}
.bet-btn.cashout{background:linear-gradient(135deg,#00c853,#009940);animation:cashGlow 1s infinite;}
@keyframes cashGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,.4)}50%{box-shadow:0 0 0 10px rgba(0,200,83,0)}}
.bet-btn.waiting{background:rgba(77,136,255,.12);border:1.5px solid rgba(77,136,255,.3);color:rgba(255,255,255,.5);cursor:not-allowed;}
.btn-sub{font-size:11px;opacity:.7;display:block;margin-top:1px;}

/* ── Auto cashout ── */
.ac-row{display:flex;gap:5px;margin-bottom:8px;align-items:center;}
.ac-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.acb{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-weight:800;padding:7px 4px;cursor:pointer;font-family:inherit;text-align:center;transition:all .12s;}
.acb.sel{background:rgba(255,204,0,.12);border-color:var(--yellow);color:var(--yellow);}
.acb:hover{border-color:var(--yellow);color:var(--yellow);}

/* ── Live bets panel ── */
.bets-panel{background:rgba(0,0,0,.45);border-top:1px solid var(--border);flex-shrink:0;}
.bp-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.bp-hdr-left{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.bp-hdr-right{font-size:11px;color:var(--muted);}
.bp-list{max-height:110px;overflow-y:auto;padding:4px 0;}
.bp-list::-webkit-scrollbar{width:2px;}
.bp-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.bp-row{display:flex;align-items:center;padding:4px 12px;gap:8px;transition:background .2s;}
.bp-row:hover{background:rgba(255,255,255,.02);}
.bp-user{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bp-bet{font-size:12px;font-weight:700;color:var(--text);width:64px;text-align:right;flex-shrink:0;}
.bp-status{font-size:12px;font-weight:800;width:90px;text-align:right;flex-shrink:0;}
.bp-status.flying{color:var(--yellow);}
.bp-status.won{color:var(--green);}
.bp-status.lost{color:var(--red);}
.bp-status.waiting{color:var(--muted);}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(30px);background:rgba(26,34,53,.95);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;z-index:200;transition:all .3s;white-space:nowrap;pointer-events:none;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="location.href='home.html'">← Home</button>
  <div class="logo">✈ <em>AVIATOR</em></div>
  <div class="wallet-pill">₹<span id="walletAmt">0.00</span></div>
</header>

<!-- History -->
<div class="hist-bar" id="histBar">
  <span style="font-size:10px;color:var(--muted);flex-shrink:0;align-self:center;">Last:</span>
</div>

<!-- Sky -->
<div class="sky" id="sky">
  <canvas id="gc"></canvas>

  <!-- Plane -->
  <div id="planeEl" style="left:6%;bottom:14%;">
    <svg viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="38" cy="25" rx="28" ry="7" fill="#cc1111"/>
      <path d="M66,25 L78,22 L78,28 Z" fill="#ff3333"/>
      <path d="M26,25 L46,4 L52,22 Z" fill="#dd1c1c"/>
      <path d="M26,25 L46,46 L52,28 Z" fill="#dd1c1c"/>
      <path d="M10,25 L6,12 L18,22 Z" fill="#aa0f0f"/>
      <path d="M10,25 L6,38 L18,28 Z" fill="#aa0f0f"/>
      <ellipse cx="8" cy="25" rx="5" ry="3.5" fill="#ff7700" opacity=".9"/>
      <ellipse cx="8" cy="25" rx="2.5" ry="1.8" fill="#ffdd44"/>
      <ellipse cx="50" cy="21" rx="4" ry="3" fill="#c8e8ff" opacity=".65"/>
    </svg>
  </div>

  <!-- Multiplier display -->
  <div class="mult-wrap" id="multWrap" style="display:none;">
    <div id="multBig" class="c1">1.00<span class="mult-x">×</span></div>
    <div class="mult-sub" id="multSub">Flying…</div>
  </div>

  <!-- Wait overlay -->
  <div id="waitOv">
    <div class="wcd" id="wcd">8</div>
    <div class="wlbl">Next round</div>
    <div class="wbets">Place your bet now!</div>
  </div>

  <!-- Crash overlay -->
  <div id="crashOv">
    <div class="crash-flew">FLEW AWAY!</div>
    <div class="crash-at" id="crashAt">2.45×</div>
    <div class="crash-next" id="crashNext">Next round in 5s…</div>
  </div>
</div>

<!-- Live cashouts -->
<div class="live-strip" id="liveStrip">
  <span style="font-size:11px;color:var(--muted);">Cashouts appear here</span>
</div>

<!-- Live Bets Panel -->
<div class="bets-panel">
  <div class="bp-hdr">
    <span class="bp-hdr-left">Live Bets</span>
    <span class="bp-hdr-right" id="bpCount">0 players</span>
  </div>
  <div class="bp-list" id="bpList">
    <div style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">Waiting for bets…</div>
  </div>
</div>

<!-- Bet Panel -->
<div class="bet-panel">
  <!-- Auto cashout row -->
  <div class="ac-row">
    <span class="ac-lbl">Auto:</span>
    <button class="acb sel" onclick="setAC(0)">Off</button>
    <button class="acb" onclick="setAC(1.2)">1.2×</button>
    <button class="acb" onclick="setAC(1.5)">1.5×</button>
    <button class="acb" onclick="setAC(4)">4×</button>
  </div>
  <div class="amt-grid">
    <button class="aqb" onclick="setA(50)">₹50</button>
    <button class="aqb" onclick="setA(100)">₹100</button>
    <button class="aqb sel" onclick="setA(200)">₹200</button>
    <button class="aqb" onclick="setA(500)">₹500</button>
    <button class="aqb" onclick="setA(1000)">₹1K</button>
    <button class="aqb" onclick="setA(2000)">₹2K</button>
    <button class="aqb" onclick="setA(5000)">₹5K</button>
    <button class="aqb" onclick="setA(10000)">₹10K</button>
  </div>
  <div class="inp-row">
    <button class="adj" onclick="adjAmt(.5)">½</button>
    <input class="a-inp" id="aviAmt" type="number" min="10" value="200"/>
    <button class="adj" onclick="adjAmt(2)">2×</button>
  </div>
  <button class="bet-btn place" id="betBtn" onclick="doBet()">
    Place Bet
    <span class="btn-sub" id="btnSub">Waiting for next round…</span>
  </button>
</div>

<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const API='', token=localStorage.getItem('cw_token');
if(!token) location.href='login.html';

let wallet=0, phase='waiting', curMult=1.00, myBet=null, graphPts=[];
let autoCashMult=0, liveBets=[];

/* ── Bot players ── */
const BN=['rahul','priya','vikram','ankit','neha','sunny','raj','pooja','amit','riya','sachin','kavya','dev','simran','karan','rohit','divya','sonu','meena','arjun','preeti','nikhil','sonam','vivek','tanya','harsh','swati','deepak','nisha','vishal','shruti','mohit','rekha','gaurav','anjali','aditya','smita','ravi','komal','suresh','mansi','ajay','pallavi','piyush','isha','sandeep','ridhi','vinay','ruhi','prakash','tina','abhishek','seema','lokesh','sneha','kunal','pinki','tarun','radha','siddharth'];
const BA=[200,300,500,500,800,1000,1000,1500,2000,2000,3000,5000,5000,8000,10000,15000,20000,50000];
let botAddTimer=null, totalBotCount=0;

function mkBots(){
  totalBotCount = 500 + Math.floor(Math.random()*350); // 500-850
  const visible = 22 + Math.floor(Math.random()*8); // 22-30 visible rows
  const bots=[];
  const used=new Set();
  for(let i=0;i<visible;i++){
    let name;
    do{ name=BN[Math.floor(Math.random()*BN.length)]+(Math.floor(Math.random()*9000)+100); }while(used.has(name));
    used.add(name);
    const amt=BA[Math.floor(Math.random()*BA.length)];
    const ac=Math.random()<0.60 ? parseFloat((1.08+Math.random()*2.6).toFixed(2)) : 0;
    bots.push({username:name,amount:amt,autoCashout:ac,status:'waiting',isBot:true});
  }
  return bots;
}

function startBotJoin(){
  clearInterval(botAddTimer);
  liveBets=[];
  const bots=mkBots();
  let i=0;
  // Stagger: add bots gradually during waiting
  botAddTimer=setInterval(()=>{
    if(i>=bots.length||phase!=='waiting'){clearInterval(botAddTimer);return;}
    const count=Math.min(3+Math.floor(Math.random()*4),bots.length-i);
    for(let c=0;c<count;c++) liveBets.unshift(bots[i++]);
    renderBets();
  },200);
}

function processBotTick(m){
  liveBets.forEach(b=>{
    if(b.isBot&&b.status==='flying'&&b.autoCashout>0&&m>=b.autoCashout){
      b.status='won'; b.mult=b.autoCashout; b.win=parseFloat((b.amount*b.autoCashout).toFixed(0));
    }
  });
}

/* ── Auto cashout ── */
function setAC(v){
  autoCashMult=v;
  document.querySelectorAll('.acb').forEach(b=>{
    const t=b.textContent.trim();
    const bv=t==='Off'?0:parseFloat(t);
    b.classList.toggle('sel',bv===v);
  });
}

/* ── Live bets ── */
function renderBets(){
  const list=document.getElementById('bpList');
  const total=totalBotCount+(myBet?1:0);
  document.getElementById('bpCount').textContent=fmt(total)+' players';
  if(!liveBets.length&&!myBet){list.innerHTML='<div style="padding:10px 12px;font-size:11px;color:var(--muted);text-align:center;">Waiting for bets…</div>';return;}
  // Sort: won first, then flying, then waiting, then lost
  const order={won:0,flying:1,waiting:2,lost:3};
  const sorted=[...liveBets].sort((a,b)=>(order[a.status]||2)-(order[b.status]||2));
  list.innerHTML=sorted.map(b=>{
    let statusHtml='',cls='';
    if(b.status==='won'){
      cls='won'; statusHtml=`✅ ${b.mult}× <b>+₹${fmt(b.win)}</b>`;
    } else if(b.status==='lost'){
      cls='lost'; statusHtml=`❌ Lost ₹${fmt(b.amount)}`;
    } else if(b.status==='flying'){
      const live=Math.floor(b.amount*curMult);
      cls='flying'; statusHtml=`✈ ₹${fmt(live)}`;
    } else {
      cls='waiting'; statusHtml='⏳';
    }
    return `<div class="bp-row">
      <span class="bp-user">@${b.username}</span>
      <span class="bp-bet">₹${fmt(b.amount)}</span>
      <span class="bp-status ${cls}">${statusHtml}</span>
    </div>`;
  }).join('');
}
function fmt(n){return Number(n).toLocaleString('en-IN');}

/* Canvas */
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const sky=document.getElementById('sky');

function resize(){canvas.width=sky.offsetWidth;canvas.height=sky.offsetHeight;}
resize(); window.addEventListener('resize',resize);

/* Stars */
for(let i=0;i<55;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*.6+.2};animation:tw ${Math.random()*4+2}s ${Math.random()*3}s infinite;`;
  sky.appendChild(s);
}
const ss=document.createElement('style');
ss.textContent='@keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}';
document.head.appendChild(ss);

/* Graph */
function drawGraph(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(graphPts.length<2) return;
  const pad={l:30,r:20,t:24,b:28};
  const maxM=Math.max(...graphPts,2);
  const pts=graphPts;

  function px(i){return pad.l+(i/(pts.length-1))*(W-pad.l-pad.r);}
  function py(m){return H-pad.b-((m-1)/(maxM-1||1))*(H-pad.t-pad.b);}

  // Gradient fill
  const g=ctx.createLinearGradient(0,py(maxM),0,H-pad.b);
  const crashed=phase==='crashed';
  g.addColorStop(0, crashed?'rgba(255,60,60,.3)':'rgba(255,140,0,.25)');
  g.addColorStop(1, crashed?'rgba(255,60,60,.03)':'rgba(255,140,0,.03)');
  ctx.beginPath();
  ctx.moveTo(px(0),py(pts[0]));
  for(let i=1;i<pts.length;i++){
    const mx=(px(i-1)+px(i))/2;
    ctx.quadraticCurveTo(px(i-1),py(pts[i-1]),mx,(py(pts[i-1])+py(pts[i]))/2);
  }
  ctx.lineTo(px(pts.length-1),py(pts[pts.length-1]));
  ctx.lineTo(px(pts.length-1),H-pad.b);
  ctx.lineTo(px(0),H-pad.b);
  ctx.closePath();
  ctx.fillStyle=g; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(px(0),py(pts[0]));
  for(let i=1;i<pts.length;i++){
    const mx=(px(i-1)+px(i))/2;
    ctx.quadraticCurveTo(px(i-1),py(pts[i-1]),mx,(py(pts[i-1])+py(pts[i]))/2);
  }
  ctx.strokeStyle=crashed?'#ff4444':'#ff8c00';
  ctx.lineWidth=2.5; ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=8;
  ctx.stroke(); ctx.shadowBlur=0;

  // Plane position
  if(pts.length>0&&phase==='flying'){
    const lx=px(pts.length-1), ly=py(pts[pts.length-1]);
    const W2=sky.offsetWidth, H2=sky.offsetHeight;
    const plane=document.getElementById('planeEl');
    plane.style.left=((lx/W2)*100-3)+'%';
    plane.style.bottom=(((H2-ly)/H2)*100-2)+'%';
    if(pts.length>3){
      const ang=Math.atan2(py(pts[pts.length-4])-ly, px(pts.length-1)-px(pts.length-4))*180/Math.PI;
      plane.style.transform=`rotate(${-Math.min(ang,40)}deg)`;
    }
  }
}

/* Phase helpers */
function setWait(cd){
  phase='waiting'; graphPts=[]; curMult=1.00;
  startBotJoin();
  document.getElementById('waitOv').style.display='flex';
  document.getElementById('multWrap').style.display='none';
  document.getElementById('crashOv').classList.remove('show');
  document.getElementById('wcd').textContent=cd;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const plane=document.getElementById('planeEl');
  plane.className=''; plane.style.left='6%'; plane.style.bottom='14%'; plane.style.transform=''; plane.style.opacity='1';
  if(!myBet){
    document.getElementById('betBtn').className='bet-btn place';
    document.getElementById('betBtn').innerHTML='Place Bet<span class="btn-sub">Waiting for round start</span>';
    document.getElementById('betBtn').disabled=false;
    document.getElementById('betBtn').onclick=doBet;
  }
}

function setFlying(){
  phase='flying'; graphPts=[1.00];
  clearInterval(botAddTimer);
  liveBets.forEach(b=>{if(b.status==='waiting') b.status='flying';});
  renderBets();
  document.getElementById('waitOv').style.display='none';
  document.getElementById('multWrap').style.display='block';
  document.getElementById('crashOv').classList.remove('show');
  setMultColor(1.00);
  if(myBet&&!myBet.cashedOut){
    document.getElementById('betBtn').className='bet-btn cashout';
    document.getElementById('betBtn').innerHTML='CASHOUT<span class="btn-sub" id="btnSub">₹'+myBet.amount+' → tap to secure</span>';
    document.getElementById('betBtn').disabled=false;
    document.getElementById('betBtn').onclick=doCashout;
  } else if(!myBet){
    document.getElementById('betBtn').className='bet-btn waiting';
    document.getElementById('betBtn').innerHTML='Missed<span class="btn-sub">Bet next round</span>';
    document.getElementById('betBtn').disabled=true;
  }
}

function setTick(m){
  curMult=m; graphPts.push(m);
  if(graphPts.length>150) graphPts=graphPts.slice(-150);
  document.getElementById('multBig').innerHTML=m.toFixed(2)+'<span class="mult-x">×</span>';
  setMultColor(m);
  drawGraph();
  if(myBet&&!myBet.cashedOut){
    const win=(myBet.amount*m).toFixed(2);
    const sub=document.getElementById('btnSub');
    if(sub) sub.textContent='₹'+win+' → tap to cashout';
    // Auto cashout check
    if(autoCashMult>0 && m>=autoCashMult) doCashout();
  }
  processBotTick(m);
  if(graphPts.length%3===0) renderBets();
}

function setMultColor(m){
  const el=document.getElementById('multBig');
  el.className=m<2?'c1':m<5?'c2':m<10?'c5':'c10';
  el.style.textShadow=`0 0 40px currentColor`;
}

function setCrash(at){
  phase='crashed'; graphPts.push(at); drawGraph();
  liveBets.forEach(b=>{
    if(b.status==='flying'){
      // Some bots "lucky" cashout right before crash
      if(b.isBot&&Math.random()<0.15){b.status='won';b.mult=parseFloat((at*0.95+Math.random()*0.04).toFixed(2));b.win=parseFloat((b.amount*b.mult).toFixed(0));}
      else b.status='lost';
    }
  });
  renderBets();
  document.getElementById('crashAt').textContent=at+'×';
  document.getElementById('crashOv').classList.add('show');
  document.getElementById('multWrap').style.display='none';
  document.getElementById('planeEl').classList.add('crashed');
  if(myBet&&!myBet.cashedOut){
    document.getElementById('betBtn').className='bet-btn waiting';
    document.getElementById('betBtn').innerHTML='Lost ₹'+myBet.amount+'<span class="btn-sub">Crashed at '+at+'×</span>';
    document.getElementById('betBtn').disabled=true;
    myBet=null;
  }
}

/* Bet helpers */
function setA(v){
  document.getElementById('aviAmt').value=v;
  document.querySelectorAll('.aqb').forEach(b=>{
    const t=b.textContent.trim().replace('₹','').replace('K','000');
    b.classList.toggle('sel',parseFloat(t)===v);
  });
}
function adjAmt(f){
  const inp=document.getElementById('aviAmt');
  inp.value=Math.max(10,parseFloat(inp.value||200)*f);
}

function updateWallet(v){wallet=v;document.getElementById('walletAmt').textContent=parseFloat(v).toFixed(2);}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

/* History chip */
function addChip(at){
  const bar=document.getElementById('histBar');
  const cls=at<2?'x1':at<5?'x2':at<10?'x5':'x10';
  const c=document.createElement('span');
  c.className='hc '+cls;
  c.textContent=at+'×';
  const ref=bar.children[1];
  ref?bar.insertBefore(c,ref):bar.appendChild(c);
  while(bar.children.length>15) bar.removeChild(bar.lastChild);
}

/* Live cashout */
function addLive(d){
  const strip=document.getElementById('liveStrip');
  if(strip.children.length===1&&strip.children[0].tagName==='SPAN') strip.innerHTML='';
  const el=document.createElement('div');
  el.className='li';
  el.innerHTML=`<span class="li-u">@${d.username}</span><span class="li-m">${d.mult}×</span><span class="li-w">+₹${d.win}</span>`;
  strip.insertBefore(el,strip.firstChild);
  while(strip.children.length>8) strip.removeChild(strip.lastChild);
}

/* API calls */
async function doBet(){
  if(phase!=='waiting'){showToast('Wait for next round');return;}
  const amt=parseFloat(document.getElementById('aviAmt').value);
  if(!amt||amt<10){showToast('Min bet ₹10');return;}
  if(amt>wallet){showToast('Insufficient balance');return;}
  const btn=document.getElementById('betBtn');
  btn.disabled=true; btn.innerHTML='Placing…<span class="btn-sub"></span>';
  try{
    const r=await fetch(API+'/api/aviator/bet',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({amount:amt})});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;btn.innerHTML='Place Bet<span class="btn-sub">Try again</span>';return;}
    myBet={amount:amt,cashedOut:false};
    updateWallet(d.newBalance);
    btn.className='bet-btn waiting';
    btn.innerHTML='Bet Placed ✓<span class="btn-sub">₹'+amt+' — flying soon…</span>';
    btn.disabled=true; btn.onclick=null;
    showToast('✈️ Bet placed! ₹'+amt);
  }catch{showToast('Error');btn.disabled=false;btn.innerHTML='Place Bet<span class="btn-sub"></span>';}
}

async function doCashout(){
  if(phase!=='flying'||!myBet||myBet.cashedOut) return;
  const btn=document.getElementById('betBtn');
  btn.disabled=true;
  try{
    const r=await fetch(API+'/api/aviator/cashout',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;return;}
    myBet.cashedOut=true;
    updateWallet(d.newBalance);
    btn.className='bet-btn waiting';
    btn.innerHTML='Cashed ✓ +₹'+d.win+'<span class="btn-sub">'+d.multiplier+'× — great call!</span>';
    showToast('🎉 Cashed at '+d.multiplier+'×! +₹'+d.win);
  }catch{showToast('Error');btn.disabled=false;}
}

/* Init */
async function init(){
  try{
    const r=await fetch(API+'/api/auth/me',{headers:{Authorization:'Bearer '+token}});
    if(!r.ok){localStorage.removeItem('cw_token');location.href='login.html';return;}
    updateWallet((await r.json()).user.wallet);
  }catch{}
  try{
    const r=await fetch(API+'/api/aviator/state',{headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    d.history?.forEach(h=>addChip(h));
    if(d.liveBets) liveBets=d.liveBets.map(b=>({...b,status:d.phase==='flying'?(b.cashedOut?'won':'flying'):'waiting'}));
    if(d.phase==='waiting') setWait(d.countdown||8);
    else if(d.phase==='flying'){setFlying();if(d.multiplier) setTick(d.multiplier);}
    else setCrash(d.multiplier||1);
  }catch{}
}

/* Socket */
const socket=io();
socket.on('avi:wait',d=>{myBet=null;setWait(d.countdown||8);d.history?.forEach(h=>addChip(h));});
socket.on('avi:cd',d=>{if(phase==='waiting') document.getElementById('wcd').textContent=d.countdown;});
socket.on('avi:fly',()=>setFlying());
socket.on('avi:tick',d=>setTick(d.multiplier));
socket.on('avi:crash',d=>{setCrash(d.at);addChip(d.at);});
socket.on('avi:cashout_pub',d=>{
  addLive(d);
  const b=liveBets.find(x=>x.username===d.username);
  if(b){b.status='won';b.mult=d.mult;b.win=d.win;renderBets();}
});
socket.on('avi:bet_placed',d=>{
  if(!liveBets.find(b=>b.username===d.username))
    liveBets.unshift({username:d.username,amount:d.amount,status:'waiting'});
  renderBets();
});
socket.on('wallet:update',d=>updateWallet(d.wallet));

init();
</script>
