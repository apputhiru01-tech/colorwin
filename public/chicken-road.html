<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chicken Road — ColorWin</title>
<style>
:root{--bg:#0a0c12;--surface:#111520;--card:#171d2e;--border:#232a40;--text:#e8eaf0;--muted:#6b729a;--red:#ff4040;--green:#00d68f;--accent:#5b8fff;--yellow:#ffd84d;--orange:#ff8c42;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden;}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.back-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;}
.wallet-pill{background:rgba(0,214,143,.1);border:1px solid rgba(0,214,143,.2);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:800;color:var(--green);}

/* Top stats */
.top-stats{background:linear-gradient(135deg,#111520,#0e1420);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.ts-item{text-align:center;}
.ts-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.ts-val{font-size:20px;font-weight:900;margin-top:1px;}

/* Road container */
.road-wrap{flex:1;position:relative;overflow:hidden;background:#111;}

/* Sky / destination zone */
.dest-zone{height:42px;background:linear-gradient(180deg,#0a2a1a,#0d3020);display:flex;align-items:center;justify-content:center;gap:10px;border-bottom:3px solid #00d68f;flex-shrink:0;position:relative;z-index:5;}
.dest-flag{font-size:22px;}
.dest-txt{font-size:13px;font-weight:800;color:var(--green);}

/* Road section */
.road{flex:1;position:relative;overflow:hidden;}

/* Asphalt */
.asphalt{position:absolute;inset:0;background:repeating-linear-gradient(180deg,#1a1a1a 0px,#1a1a1a 50px,#1c1c1c 50px,#1c1c1c 52px);}

/* Lane separators - animated dashes */
.lane-dash{position:absolute;left:0;right:0;height:2px;background:repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(255,255,200,.18) 20px,rgba(255,255,200,.18) 36px);animation:dashMove 0.6s linear infinite;}
@keyframes dashMove{from{background-position:0 0}to{background-position:56px 0}}

/* Individual lane */
.lane{position:absolute;left:0;right:0;height:52px;display:flex;align-items:center;overflow:hidden;transition:all .2s;}
.lane.passed{background:rgba(0,214,143,.04);}
.lane.active{background:rgba(255,216,77,.07);box-shadow:0 0 0 2px rgba(255,216,77,.2) inset;}
.lane.safe-lane{background:rgba(0,214,143,.06);}

/* Cars */
.car{position:absolute;font-size:26px;will-change:transform;}
.car.go-left{animation:goLeft linear infinite;}
.car.go-right{animation:goRight linear infinite;}
@keyframes goLeft{from{left:105%}to{left:-15%}}
@keyframes goRight{from{right:105%}to{right:-15%}}

/* Chicken */
.chicken-wrap{position:absolute;left:50%;transform:translateX(-50%);z-index:10;transition:bottom .45s cubic-bezier(.34,1.56,.64,1);text-align:center;}
.chicken-sprite{font-size:32px;display:block;animation:chickenBob 0.8s ease-in-out infinite;}
@keyframes chickenBob{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-4px) scaleX(1.05)}}
.chicken-wrap.jump .chicken-sprite{animation:chickenJump .45s ease;}
@keyframes chickenJump{0%{transform:translateY(0) scaleX(1)}35%{transform:translateY(-20px) scaleX(1.15)}100%{transform:translateY(0) scaleX(1)}}
.chicken-wrap.dead .chicken-sprite{animation:chickenDead .5s ease forwards;}
@keyframes chickenDead{0%{transform:rotate(0) scale(1);filter:none}50%{transform:rotate(30deg) scale(1.3);filter:hue-rotate(90deg)}100%{transform:rotate(-80deg) scale(.15);opacity:0;filter:hue-rotate(180deg)}}

/* Multiplier labels on right side */
.mult-labels{position:absolute;right:8px;top:0;bottom:0;z-index:6;display:flex;flex-direction:column-reverse;pointer-events:none;}
.ml-item{height:52px;display:flex;align-items:center;}
.ml-badge{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:800;color:var(--muted);}
.ml-badge.done{color:var(--green);border-color:rgba(0,214,143,.3);}
.ml-badge.current{color:var(--yellow);border-color:rgba(255,216,77,.4);background:rgba(255,216,77,.1);}
.ml-badge.next{color:#fff;border-color:rgba(255,255,255,.25);}

/* Explosion */
.explosion{position:absolute;left:50%;transform:translateX(-50%);font-size:48px;z-index:20;display:none;animation:explode .5s ease forwards;}
@keyframes explode{0%{transform:translateX(-50%) scale(.5);opacity:1}100%{transform:translateX(-50%) scale(2.5);opacity:0}}

/* Start zone */
.start-zone{height:46px;background:linear-gradient(180deg,#1a1008,#201500);display:flex;align-items:center;justify-content:center;border-top:3px solid var(--orange);flex-shrink:0;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:1px;position:relative;z-index:5;}

/* Result overlay */
.result-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:30;backdrop-filter:blur(4px);}
.result-overlay.show{display:flex;animation:rIn .3s ease;}
@keyframes rIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.res-card{background:var(--card);border:2px solid;border-radius:20px;padding:24px 32px;text-align:center;}
.res-card.win{border-color:var(--green);}
.res-card.lose{border-color:var(--red);}
.res-icon{font-size:48px;margin-bottom:8px;}
.res-title{font-size:22px;font-weight:900;}
.res-amount{font-size:32px;font-weight:900;margin-top:4px;}

/* Bottom panel */
.bottom{background:var(--surface);border-top:1px solid var(--border);padding:12px 14px;flex-shrink:0;}
.setup{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.bet-inp{background:var(--card);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:17px;font-weight:800;padding:10px 14px;outline:none;flex:1;font-family:inherit;}
.bet-inp:focus{border-color:var(--accent);}
.qchips{display:flex;gap:6px;margin-bottom:10px;}
.qc{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:700;padding:6px 0;cursor:pointer;font-family:inherit;flex:1;text-align:center;}
.qc.sel{background:rgba(255,140,66,.15);border-color:var(--orange);color:var(--orange);}
.btn-row{display:flex;gap:8px;}
.mbtn{flex:1;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:900;padding:14px;cursor:pointer;font-family:inherit;transition:all .15s;}
.mbtn:disabled{opacity:.4;cursor:not-allowed;}
.mbtn.start{background:linear-gradient(135deg,#ff8c42,#e67322);}
.mbtn.jump{background:linear-gradient(135deg,#ffd84d,#e6a800);color:#111;display:none;animation:jGlow .7s infinite;}
@keyframes jGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,216,77,.4)}50%{box-shadow:0 0 12px 4px rgba(255,216,77,.1)}}
.mbtn.cashout{background:linear-gradient(135deg,#00d68f,#00a86b);display:none;animation:cGlow 1s infinite;}
@keyframes cGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,214,143,.4)}50%{box-shadow:0 0 10px 3px rgba(0,214,143,0)}}
.mbtn.newgame{background:var(--card);border:1.5px solid var(--border);color:var(--text);display:none;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;z-index:99;transition:transform .3s;white-space:nowrap;pointer-events:none;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
/* Win Overlay */
#winOverlay{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);cursor:pointer;}
#winOverlay.show{display:flex;animation:wOvIn .35s ease;}
@keyframes wOvIn{from{opacity:0}to{opacity:1}}
@keyframes wOvOut{from{opacity:1}to{opacity:0}}
#winCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.win-center{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;}
.win-emoji{font-size:88px;display:block;animation:wBounce .7s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes wBounce{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.win-title{font-size:38px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#ffd84d,#ff8c42,#ff4d6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:wUp .5s .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes wUp{0%{transform:translateY(40px);opacity:0}100%{transform:translateY(0);opacity:1}}
.win-amount{font-size:64px;font-weight:900;color:#00d68f;text-shadow:0 0 40px rgba(0,214,143,.7),0 0 80px rgba(0,214,143,.3);animation:wPop .6s .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes wPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.win-label{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:3px;text-transform:uppercase;animation:wUp .5s .55s both;}
.win-stars{font-size:28px;animation:wSpin 1s .3s both;display:block;}
@keyframes wSpin{0%{transform:scale(0) rotate(-180deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.win-tap{font-size:12px;color:rgba(255,255,255,.28);margin-top:16px;animation:wFade 1s 2s both;letter-spacing:1px;}
@keyframes wFade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="location.href='home.html'">← Home</button>
  <div style="font-size:15px;font-weight:900;">🐔 Chicken Road</div>
  <div class="wallet-pill">₹<span id="walletAmt">0.00</span></div>
</header>

<div class="top-stats">
  <div class="ts-item">
    <div class="ts-lbl">Multiplier</div>
    <div class="ts-val" id="multVal" style="color:var(--green);">1.00×</div>
  </div>
  <div class="ts-item">
    <div class="ts-lbl">Step</div>
    <div class="ts-val" id="stepVal" style="color:var(--yellow);">0 / 10</div>
  </div>
  <div class="ts-item">
    <div class="ts-lbl">Win If Cash</div>
    <div class="ts-val" id="winVal" style="color:var(--orange);">₹0</div>
  </div>
</div>

<!-- Road wrapper -->
<div class="road-wrap" id="roadWrap">

  <!-- Destination -->
  <div class="dest-zone">
    <span class="dest-flag">🏁</span>
    <span class="dest-txt">FINISH — 55x</span>
    <span class="dest-flag">🏁</span>
  </div>

  <!-- Road with lanes + cars -->
  <div class="road" id="road" style="height:calc(100% - 88px);position:relative;">
    <div class="asphalt"></div>

    <!-- Lanes populated by JS -->
    <div id="lanesContainer"></div>

    <!-- Lane dashes -->
    <div id="dashesContainer"></div>

    <!-- Mult labels -->
    <div class="mult-labels" id="multLabels"></div>

    <!-- Chicken -->
    <div class="chicken-wrap" id="chickenWrap" style="bottom:8px;">
      <span class="chicken-sprite" id="chickenSprite">🐔</span>
    </div>

    <!-- Explosion -->
    <div class="explosion" id="explosion">💥</div>

    <!-- Result overlay -->
    <div class="result-overlay" id="resultOverlay">
      <div class="res-card" id="resCard">
        <div class="res-icon" id="resIcon"></div>
        <div class="res-title" id="resTitle"></div>
        <div class="res-amount" id="resAmt"></div>
      </div>
    </div>
  </div>

  <!-- Start zone -->
  <div class="start-zone">🏠 START ZONE</div>

</div>

<!-- Bottom -->
<div class="bottom">
  <div class="setup" id="setupRow">
    <input class="bet-inp" id="betAmt" type="number" min="10" value="100" placeholder="Bet ₹"/>
    <div class="qchips" style="flex:1;margin-bottom:0;">
      <button class="qc" onclick="sa(50)">₹50</button>
      <button class="qc sel" onclick="sa(100)">₹100</button>
      <button class="qc" onclick="sa(200)">₹200</button>
      <button class="qc" onclick="sa(500)">₹500</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="mbtn start" id="startBtn" onclick="startGame()">🐔 Start</button>
    <button class="mbtn jump"  id="jumpBtn"  onclick="doJump()">⬆ Jump!</button>
    <button class="mbtn cashout" id="cashoutBtn" onclick="doCashout()">💰 ₹<span id="coAmt">0</span></button>
    <button class="mbtn newgame" id="newgameBtn" onclick="resetGame()">↩ New</button>
  </div>
</div>

<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const API='', token=localStorage.getItem('cw_token');
if(!token) location.href='login.html';

const MULTS=[1.00,1.50,2.20,3.20,4.70,7.00,10.50,16.00,24.00,36.00,55.00];
const TOTAL=10;
const CARS=['🚗','🚕','🚙','🚌','🏎','🚓','🚑','🚐'];
const COLORS=['#ff4444','#44aaff','#ffaa00','#44ff88','#ff44aa','#aa44ff'];

let wallet=0, gameActive=false, currentStep=0, betAmount=100;
let laneHeight=52, roadHeight=520;

// Build road UI
function buildRoad(){
  const road=document.getElementById('road');
  const lanesC=document.getElementById('lanesContainer');
  const dashesC=document.getElementById('dashesContainer');
  const multLabels=document.getElementById('multLabels');
  roadHeight=road.offsetHeight||400;
  laneHeight=Math.min(52,Math.floor((roadHeight-10)/TOTAL));

  lanesC.innerHTML=''; dashesC.innerHTML=''; multLabels.innerHTML='';

  for(let i=1;i<=TOTAL;i++){
    const bottom=(i-1)*laneHeight;

    // Lane div
    const lane=document.createElement('div');
    lane.className='lane';
    lane.id='lane'+i;
    lane.style.cssText=`bottom:${bottom}px;height:${laneHeight}px;`;

    // Add animated cars to lane
    const numCars=i<4?1:i<7?2:2;
    const goLeft=i%2===0;
    const speed=2.5+Math.random()*2.5;

    for(let c=0;c<numCars;c++){
      const car=document.createElement('span');
      car.className='car '+(goLeft?'go-left':'go-right');
      car.textContent=CARS[Math.floor(Math.random()*CARS.length)];
      const dur=(speed + c*1.5).toFixed(1);
      const delay=(-Math.random()*parseFloat(dur)).toFixed(1);
      car.style.cssText=`font-size:${22+Math.floor(Math.random()*6)}px;top:50%;transform:translateY(-50%) scaleX(${goLeft?-1:1});animation-duration:${dur}s;animation-delay:${delay}s;`;
      lane.appendChild(car);
    }
    lanesC.appendChild(lane);

    // Dash line
    const dash=document.createElement('div');
    dash.className='lane-dash';
    dash.style.bottom=bottom+'px';
    dashesC.appendChild(dash);

    // Multiplier label
    const ml=document.createElement('div');
    ml.className='ml-item';
    const badge=document.createElement('div');
    badge.className='ml-badge';
    badge.id='mlb'+i;
    badge.textContent=MULTS[i]+'x';
    ml.appendChild(badge);
    multLabels.appendChild(ml);
  }
}

window.addEventListener('load',()=>{buildRoad();updateStats(0,MULTS[0]);});
window.addEventListener('resize',buildRoad);

function getLaneBottom(step){
  if(step===0) return 8;
  return (step-1)*laneHeight + laneHeight/2 - 20;
}

function moveChicken(step,animate=true){
  const wrap=document.getElementById('chickenWrap');
  if(animate){
    wrap.classList.add('jump');
    setTimeout(()=>wrap.classList.remove('jump'),450);
  }
  wrap.style.bottom=getLaneBottom(step)+'px';
}

function setLaneState(step,state){
  const lane=document.getElementById('lane'+step);
  if(lane) lane.className='lane '+(state==='passed'?'passed':state==='active'?'active':'safe-lane');
  const badge=document.getElementById('mlb'+step);
  if(badge) badge.className='ml-badge '+(state==='passed'?'done':state==='active'?'current':state==='next'?'next':'');
}

function updateStats(step,mult){
  document.getElementById('multVal').textContent=parseFloat(mult).toFixed(2)+'×';
  const el=document.getElementById('multVal');
  el.style.color=mult<3?'var(--green)':mult<8?'var(--yellow)':'var(--orange)';
  document.getElementById('stepVal').textContent=step+' / '+TOTAL;
  const win=(betAmount*mult).toFixed(2);
  document.getElementById('winVal').textContent='₹'+win;
  document.getElementById('coAmt').textContent=win;
}

function sa(v){
  betAmount=v;
  document.getElementById('betAmt').value=v;
  document.querySelectorAll('.qc').forEach(c=>c.classList.toggle('sel',parseFloat(c.textContent.replace('₹',''))===v));
}

function updateWallet(v){wallet=v;document.getElementById('walletAmt').textContent=parseFloat(v).toFixed(2);}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

function showResult(type,icon,title,amount){
  const ov=document.getElementById('resultOverlay');
  const card=document.getElementById('resCard');
  ov.classList.add('show');
  card.className='res-card '+type;
  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resAmt').textContent=amount;
}

async function startGame(){
  betAmount=parseFloat(document.getElementById('betAmt').value)||100;
  if(betAmount<10){showToast('Min ₹10');return;}
  if(betAmount>wallet){showToast('Insufficient balance');return;}
  const btn=document.getElementById('startBtn');
  btn.disabled=true; btn.textContent='Starting…';
  try{
    const r=await fetch(API+'/api/chicken/start',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({amount:betAmount})});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;btn.innerHTML='🐔 Start';return;}
    updateWallet(d.newBalance);
    gameActive=true; currentStep=0;
    // Reset UI
    document.getElementById('resultOverlay').classList.remove('show');
    document.getElementById('explosion').style.display='none';
    document.getElementById('chickenSprite').textContent='🐔';
    document.getElementById('chickenWrap').className='chicken-wrap';
    moveChicken(0,false);
    for(let i=1;i<=TOTAL;i++) setLaneState(i,'');
    setLaneState(1,'next');
    document.getElementById('setupRow').style.display='none';
    document.getElementById('startBtn').style.display='none';
    document.getElementById('jumpBtn').style.display='block';
    document.getElementById('cashoutBtn').style.display='none';
    document.getElementById('newgameBtn').style.display='none';
    updateStats(0,MULTS[0]);
  }catch{showToast('Error');btn.disabled=false;btn.innerHTML='🐔 Start';}
}

async function doJump(){
  if(!gameActive) return;
  const btn=document.getElementById('jumpBtn');
  btn.disabled=true;
  try{
    const r=await fetch(API+'/api/chicken/jump',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;return;}

    if(d.result==='burned'){
      // Show crash
      moveChicken(d.step,true);
      setLaneState(d.step,'active');
      setTimeout(()=>{
        document.getElementById('chickenWrap').className='chicken-wrap dead';
        const exp=document.getElementById('explosion');
        exp.style.display='block';
        exp.style.bottom=getLaneBottom(d.step)+'px';
        setTimeout(()=>exp.style.display='none',600);
      },200);
      gameActive=false;
      setTimeout(()=>{
        showResult('lose','💥','Car ne mara!',`Lost ₹${betAmount}`);
        document.getElementById('jumpBtn').style.display='none';
        document.getElementById('newgameBtn').style.display='block';
      },700);
      showToast(`🚗 Car ne mara! Lost ₹${betAmount}`);
    } else {
      setLaneState(d.step,'passed');
      if(d.step>1) setLaneState(d.step-1,'passed');
      moveChicken(d.step,true);
      currentStep=d.step;
      updateStats(d.step, d.multiplier);
      if(d.result==='maxed'){
        gameActive=false;
        updateWallet(d.newBalance);
        setTimeout(()=>{
          showResult('win','🏆','Finish line!',`+₹${d.win} (${d.multiplier}×)`);
          document.getElementById('jumpBtn').style.display='none';
          document.getElementById('cashoutBtn').style.display='none';
          document.getElementById('newgameBtn').style.display='block';
        },500);
        showToast(`🎉 Won ₹${d.win}!`);
        showWinAnimation(d.win, 'Chicken Road Win!');
      } else {
        setLaneState(d.step+1,'next');
        btn.disabled=false;
        document.getElementById('cashoutBtn').style.display='block';
      }
    }
  }catch{showToast('Error');btn.disabled=false;}
}

async function doCashout(){
  if(!gameActive) return;
  const btn=document.getElementById('cashoutBtn');
  btn.disabled=true;
  try{
    const r=await fetch(API+'/api/chicken/cashout',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;return;}
    updateWallet(d.newBalance);
    gameActive=false;
    setTimeout(()=>{
      showResult('win','💰','Safe!',`+₹${d.win} (${d.multiplier}×)`);
      document.getElementById('jumpBtn').style.display='none';
      btn.style.display='none';
      document.getElementById('newgameBtn').style.display='block';
    },300);
    showToast(`💰 Won ₹${d.win} at ${d.multiplier}×!`);
    showWinAnimation(d.win, 'Chicken Road Win!');
  }catch{showToast('Error');btn.disabled=false;}
}

function resetGame(){
  gameActive=false; currentStep=0;
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('chickenWrap').className='chicken-wrap';
  document.getElementById('chickenSprite').textContent='🐔';
  document.getElementById('explosion').style.display='none';
  moveChicken(0,false);
  for(let i=1;i<=TOTAL;i++) setLaneState(i,'');
  setLaneState(1,'next');
  document.getElementById('setupRow').style.display='flex';
  document.getElementById('startBtn').style.display='block';
  document.getElementById('startBtn').disabled=false;
  document.getElementById('startBtn').textContent='🐔 Start';
  document.getElementById('jumpBtn').style.display='none';
  document.getElementById('cashoutBtn').style.display='none';
  document.getElementById('newgameBtn').style.display='none';
  updateStats(0,MULTS[0]);
}

async function init(){
  try{
    const r=await fetch(API+'/api/auth/me',{headers:{Authorization:'Bearer '+token}});
    if(!r.ok){localStorage.removeItem('cw_token');location.href='login.html';return;}
    updateWallet((await r.json()).user.wallet);
  }catch{}
  try{
    const r=await fetch(API+'/api/chicken/state',{headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    if(d.active){
      betAmount=d.amount; currentStep=d.step; gameActive=true;
      document.getElementById('betAmt').value=betAmount;
      for(let i=1;i<=d.step;i++) setLaneState(i,'passed');
      if(d.step<TOTAL) setLaneState(d.step+1,'next');
      moveChicken(d.step,false);
      document.getElementById('setupRow').style.display='none';
      document.getElementById('startBtn').style.display='none';
      document.getElementById('jumpBtn').style.display='block';
      document.getElementById('cashoutBtn').style.display=d.step>0?'block':'none';
      updateStats(d.step,d.multiplier);
    }
  }catch{}
}

const socket=io();
socket.on('wallet:update',d=>updateWallet(d.wallet));
init();

// ── Win Animation ──
let _confettiFrame=null;
const _confettiColors=['#ffd84d','#ff4d6a','#5b8fff','#00d68f','#9b59ff','#ff8c42','#fff','#ff69b4'];
function showWinAnimation(amount,label){
  let ov=document.getElementById('winOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='winOverlay';
    ov.innerHTML=`<canvas id="winCanvas"></canvas><div class="win-center"><span class="win-emoji">🎉</span><div class="win-title">CONGRATULATIONS!</div><div class="win-amount" id="winAmt">+₹0</div><div class="win-label" id="winLbl">Amazing win!</div><span class="win-stars">⭐✨⭐</span><div class="win-tap">Tap anywhere to continue</div></div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click',hideWinAnimation);
  }
  document.getElementById('winAmt').textContent='+₹'+parseFloat(amount).toFixed(2);
  document.getElementById('winLbl').textContent=label||'Amazing win!';
  ov.classList.add('show');
  _startConfetti();
  clearTimeout(ov._t);
  ov._t=setTimeout(hideWinAnimation,5000);
}
function hideWinAnimation(){
  const ov=document.getElementById('winOverlay');
  if(!ov||!ov.classList.contains('show'))return;
  ov.style.animation='wOvOut .3s ease forwards';
  setTimeout(()=>{ov.classList.remove('show');ov.style.animation='';},300);
  _stopConfetti();
}
function _startConfetti(){
  const canvas=document.getElementById('winCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=[];
  for(let i=0;i<150;i++){pieces.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,w:7+Math.random()*10,h:4+Math.random()*6,color:_confettiColors[Math.floor(Math.random()*_confettiColors.length)],speed:2+Math.random()*5,angle:Math.random()*360,spin:(Math.random()-.5)*10,swingA:Math.random()*Math.PI*2,swingS:0.02+Math.random()*.04,swing:Math.random()*3-1.5});}
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;pieces.forEach(p=>{p.y+=p.speed;p.angle+=p.spin;p.swingA+=p.swingS;p.x+=Math.sin(p.swingA)*p.swing;if(p.y<canvas.height+30)alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-(p.y/canvas.height)*.4);ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});if(alive)_confettiFrame=requestAnimationFrame(draw);}
  cancelAnimationFrame(_confettiFrame);_confettiFrame=requestAnimationFrame(draw);
}
function _stopConfetti(){cancelAnimationFrame(_confettiFrame);const canvas=document.getElementById('winCanvas');if(canvas)canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);}
</script>
