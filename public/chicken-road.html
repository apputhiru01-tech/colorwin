<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Chicken Road 2 — ColorWin</title>
<style>
:root{--bg:#080c10;--surface:#0f1318;--card:#161d24;--border:#242e38;--text:#e8eaf0;--muted:#6b7a90;--orange:#ff8c42;--yellow:#ffd84d;--green:#00d68f;--red:#ff4444;--accent:#5b8fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden;}

/* ── Header ── */
header{background:var(--surface);border-bottom:2px solid var(--orange);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.back-btn{width:36px;height:36px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;}
.header-center{display:flex;flex-direction:column;align-items:center;flex:1;}
.header-title{font-size:16px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;}
.header-badge{font-size:9px;font-weight:800;color:var(--orange);background:rgba(255,140,66,.15);border:1px solid rgba(255,140,66,.3);border-radius:5px;padding:2px 6px;letter-spacing:.5px;}
.wallet-pill{background:rgba(0,214,143,.1);border:1px solid rgba(0,214,143,.25);border-radius:16px;padding:6px 12px;font-size:13px;font-weight:800;color:var(--green);white-space:nowrap;flex-shrink:0;}

/* ── Stats Bar ── */
.stats-bar{background:linear-gradient(180deg,#0d1118,#0a0e14);border-bottom:1px solid var(--border);padding:10px 8px;display:flex;align-items:center;flex-shrink:0;}
.stat-item{flex:1;text-align:center;padding:0 4px;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:900;line-height:1;}
.stat-val.green{color:var(--green);}
.stat-val.yellow{color:var(--yellow);}
.stat-val.orange{color:var(--orange);}
.stat-div{width:1px;height:38px;background:var(--border);flex-shrink:0;}

/* ── Road Wrapper ── */
.road-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* Destination */
.dest-zone{background:linear-gradient(180deg,#031408,#051a0a);border-bottom:2.5px solid var(--green);padding:7px 14px;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;}
.dest-txt{font-size:12px;font-weight:900;color:var(--green);letter-spacing:.8px;}

/* Road */
.road{flex:1;position:relative;overflow:hidden;min-height:0;}
.asphalt{position:absolute;inset:0;background:#111518;}

/* Lanes */
.lane{position:absolute;left:0;right:0;}
.lane.passed{background:rgba(0,214,143,.05);}
.lane.active{background:rgba(255,216,77,.09);}
.lane.next-lane{background:rgba(255,140,66,.05);}
.lane-dash{position:absolute;left:0;right:0;height:1px;background:repeating-linear-gradient(90deg,transparent,transparent 16px,rgba(255,255,255,.07) 16px,rgba(255,255,255,.07) 28px);animation:dashMove .45s linear infinite;}
@keyframes dashMove{from{background-position:0 0}to{background-position:44px 0}}

/* Cars */
.car{position:absolute;will-change:transform;z-index:3;}
.car.go-left{animation:goLeft linear infinite;}
.car.go-right{animation:goRight linear infinite;}
@keyframes goLeft{from{left:110%}to{left:-20%}}
@keyframes goRight{from{right:110%}to{right:-20%}}

/* Multiplier badges */
.mult-labels{position:absolute;right:5px;top:0;bottom:0;z-index:6;display:flex;flex-direction:column-reverse;pointer-events:none;}
.ml-item{display:flex;align-items:center;justify-content:flex-end;}
.ml-badge{background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:800;color:var(--muted);backdrop-filter:blur(4px);}
.ml-badge.done{color:var(--green);border-color:rgba(0,214,143,.3);}
.ml-badge.current{color:var(--yellow);border-color:rgba(255,216,77,.5);background:rgba(255,216,77,.12);}
.ml-badge.next{color:#fff;border-color:rgba(255,255,255,.2);}

/* Chicken */
.chicken-wrap{position:absolute;left:50%;transform:translateX(-50%);z-index:10;transition:bottom .42s cubic-bezier(.34,1.56,.64,1);text-align:center;}
.chicken-sprite{font-size:34px;display:block;animation:chickenBob .85s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(255,140,66,.5));}
@keyframes chickenBob{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-5px) scaleY(1.05)}}
.chicken-wrap.jump .chicken-sprite{animation:chickenJump .42s ease;}
@keyframes chickenJump{0%{transform:translateY(0)}35%{transform:translateY(-22px) scaleY(1.2)}100%{transform:translateY(0)}}
.chicken-wrap.dead .chicken-sprite{animation:chickenDead .5s ease forwards;}
@keyframes chickenDead{0%{transform:rotate(0) scale(1)}50%{transform:rotate(40deg) scale(1.4);filter:hue-rotate(90deg)}100%{transform:rotate(-90deg) scale(.1);opacity:0}}

/* Explosion */
.explosion{position:absolute;left:50%;transform:translateX(-50%);font-size:52px;z-index:20;display:none;animation:explode .55s ease forwards;}
@keyframes explode{0%{transform:translateX(-50%) scale(.4);opacity:1}100%{transform:translateX(-50%) scale(2.8);opacity:0}}

/* Start zone */
.start-zone{background:linear-gradient(180deg,#120800,#0c0500);border-top:2.5px solid var(--orange);padding:7px 14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;font-weight:800;color:var(--orange);letter-spacing:1.5px;flex-shrink:0;}

/* Result overlay */
.result-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;backdrop-filter:blur(6px);background:rgba(0,0,0,.55);}
.result-overlay.show{display:flex;animation:rIn .3s ease;}
@keyframes rIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.res-card{background:var(--card);border:2px solid;border-radius:22px;padding:26px 36px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.7);}
.res-card.win{border-color:var(--green);box-shadow:0 12px 40px rgba(0,214,143,.2);}
.res-card.lose{border-color:var(--red);box-shadow:0 12px 40px rgba(255,68,68,.2);}
.res-icon{font-size:54px;margin-bottom:10px;}
.res-title{font-size:20px;font-weight:900;}
.res-amount{font-size:28px;font-weight:900;margin-top:8px;}
.res-card.win .res-amount{color:var(--green);}
.res-card.lose .res-amount{color:var(--red);}

/* ── Bottom Panel ── */
.bottom-panel{background:var(--surface);border-top:1px solid var(--border);padding:12px 14px 16px;flex-shrink:0;}

/* Bet amount row */
.amount-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.adj-btn{width:40px;height:40px;background:var(--card);border:1.5px solid var(--border);color:#fff;border-radius:50%;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;transition:all .15s;}
.adj-btn:active{background:rgba(255,140,66,.2);border-color:var(--orange);}
.bet-inp{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:#fff;font-size:20px;font-weight:900;padding:10px 14px;outline:none;text-align:center;font-family:inherit;transition:border-color .2s;}
.bet-inp:focus{border-color:var(--orange);}

/* Quick chips */
.chips-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:12px;font-weight:700;padding:8px 0;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.chip.sel{background:rgba(255,140,66,.15);border-color:var(--orange);color:var(--orange);}
.chip:active{transform:scale(.94);}

/* Action buttons */
.mbtn{border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:900;padding:14px;cursor:pointer;font-family:inherit;transition:transform .1s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.2px;}
.mbtn:active{transform:scale(.96);}
.mbtn:disabled{opacity:.35;cursor:not-allowed;transform:none !important;}

.start-btn{width:100%;background:linear-gradient(135deg,#ff8c42,#d06018);box-shadow:0 4px 18px rgba(255,140,66,.35);font-size:17px;}
.start-btn-icon{font-size:22px;}

.game-btns{display:flex;gap:8px;}
.jump-btn{flex:3;background:linear-gradient(135deg,#ffd84d,#d4960a);color:#1a1000;font-size:18px;padding:16px;animation:jGlow .8s infinite;}
@keyframes jGlow{0%,100%{box-shadow:0 4px 14px rgba(255,216,77,.25)}50%{box-shadow:0 4px 28px rgba(255,216,77,.6)}}
.cashout-btn{flex:2;background:linear-gradient(135deg,#00d68f,#009060);font-size:13px;padding:16px 8px;animation:cGlow 1s infinite;text-align:center;line-height:1.3;}
@keyframes cGlow{0%,100%{box-shadow:0 4px 12px rgba(0,214,143,.2)}50%{box-shadow:0 4px 24px rgba(0,214,143,.5)}}
.newgame-btn{width:100%;background:var(--card);border:1.5px solid var(--border);color:var(--text);font-size:15px;}

/* Level selector */
.level-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.lvl-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:7px 4px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.lvl-btn.sel{border-color:var(--orange);background:rgba(255,140,66,.12);}
.lvl-name{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.lvl-mult{font-size:13px;font-weight:900;color:#fff;margin-top:2px;}
.lvl-btn.sel .lvl-name{color:var(--orange);}
.lvl-btn.sel .lvl-mult{color:var(--orange);}
.lvl-risk{font-size:9px;margin-top:1px;font-weight:700;}
.lvl-btn[data-lvl="1"] .lvl-risk{color:#00d68f;}
.lvl-btn[data-lvl="2"] .lvl-risk{color:#ffd84d;}
.lvl-btn[data-lvl="3"] .lvl-risk{color:#ff8c42;}
.lvl-btn[data-lvl="4"] .lvl-risk{color:#ff4444;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 22px;font-size:13px;font-weight:700;z-index:99;transition:transform .3s,opacity .3s;white-space:nowrap;pointer-events:none;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* Win Overlay */
#winOverlay{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);cursor:pointer;}
#winOverlay.show{display:flex;animation:wOvIn .35s ease;}
@keyframes wOvIn{from{opacity:0}to{opacity:1}}
@keyframes wOvOut{from{opacity:1}to{opacity:0}}
#winCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.win-center{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;}
.win-emoji{font-size:88px;display:block;animation:wBounce .7s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes wBounce{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.win-title{font-size:38px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#ffd84d,#ff8c42,#ff4d6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:wUp .5s .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes wUp{0%{transform:translateY(40px);opacity:0}100%{transform:translateY(0);opacity:1}}
.win-amount{font-size:64px;font-weight:900;color:#00d68f;text-shadow:0 0 40px rgba(0,214,143,.7);animation:wPop .6s .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes wPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.win-label{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:3px;text-transform:uppercase;animation:wUp .5s .55s both;}
.win-stars{font-size:28px;animation:wSpin 1s .3s both;display:block;}
@keyframes wSpin{0%{transform:scale(0) rotate(-180deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.win-tap{font-size:12px;color:rgba(255,255,255,.28);margin-top:16px;animation:wFade 1s 2s both;letter-spacing:1px;}
@keyframes wFade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- Header -->
<header>
  <button class="back-btn" onclick="location.href='home.html'">←</button>
  <div class="header-center">
    <div class="header-title">🐔 Chicken Road 2</div>
    <div class="header-badge">JUMP TO WIN</div>
  </div>
  <div class="wallet-pill">₹<span id="walletAmt">0.00</span></div>
</header>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-lbl">Multiplier</div>
    <div class="stat-val green" id="multVal">1.00×</div>
  </div>
  <div class="stat-div"></div>
  <div class="stat-item">
    <div class="stat-lbl">Step</div>
    <div class="stat-val yellow" id="stepVal">0 / 10</div>
  </div>
  <div class="stat-div"></div>
  <div class="stat-item">
    <div class="stat-lbl">Win if Cash</div>
    <div class="stat-val orange" id="winVal">₹0</div>
  </div>
</div>

<!-- Road -->
<div class="road-wrap" id="roadWrap">

  <div class="dest-zone">
    <span>🏁</span>
    <span class="dest-txt">FINISH — 6.20×</span>
    <span>🏁</span>
  </div>

  <div class="road" id="road">
    <div class="asphalt"></div>
    <div id="lanesContainer"></div>
    <div id="dashesContainer"></div>
    <div class="mult-labels" id="multLabels"></div>

    <div class="chicken-wrap" id="chickenWrap" style="bottom:6px;">
      <span class="chicken-sprite" id="chickenSprite">🐔</span>
    </div>

    <div class="explosion" id="explosion">💥</div>

    <div class="result-overlay" id="resultOverlay">
      <div class="res-card" id="resCard">
        <div class="res-icon" id="resIcon"></div>
        <div class="res-title" id="resTitle"></div>
        <div class="res-amount" id="resAmt"></div>
      </div>
    </div>
  </div>

  <div class="start-zone">🏠 START ZONE</div>

</div>

<!-- Bottom Panel -->
<div class="bottom-panel">

  <!-- Setup: shown before game starts -->
  <div id="setupSection">
    <!-- Level selector -->
    <div class="level-row">
      <button class="lvl-btn sel" data-lvl="1" onclick="setLevel(1)">
        <div class="lvl-name">Easy</div>
        <div class="lvl-mult">1.2×</div>
        <div class="lvl-risk">Low</div>
      </button>
      <button class="lvl-btn" data-lvl="2" onclick="setLevel(2)">
        <div class="lvl-name">Medium</div>
        <div class="lvl-mult">2×</div>
        <div class="lvl-risk">Mid</div>
      </button>
      <button class="lvl-btn" data-lvl="3" onclick="setLevel(3)">
        <div class="lvl-name">Hard</div>
        <div class="lvl-mult">3×</div>
        <div class="lvl-risk">High</div>
      </button>
      <button class="lvl-btn" data-lvl="4" onclick="setLevel(4)">
        <div class="lvl-name">Extreme</div>
        <div class="lvl-mult">5×</div>
        <div class="lvl-risk">Brutal</div>
      </button>
    </div>
    <div class="amount-row">
      <button class="adj-btn" onclick="adjBet(.5)">−</button>
      <input class="bet-inp" id="betAmt" type="number" min="10" value="100"/>
      <button class="adj-btn" onclick="adjBet(2)">+</button>
    </div>
    <div class="chips-row">
      <button class="chip" onclick="sa(50)">₹50</button>
      <button class="chip sel" onclick="sa(100)">₹100</button>
      <button class="chip" onclick="sa(200)">₹200</button>
      <button class="chip" onclick="sa(500)">₹500</button>
    </div>
    <button class="mbtn start-btn" id="startBtn" onclick="startGame()">
      <span class="start-btn-icon">🐔</span> Start Game
    </button>
  </div>

  <!-- Game controls: shown while playing -->
  <div id="gameSection" style="display:none;">
    <div class="game-btns">
      <button class="mbtn jump-btn" id="jumpBtn" onclick="doJump()">⬆ JUMP!</button>
      <button class="mbtn cashout-btn" id="cashoutBtn" onclick="doCashout()">💰 Cash Out<br>₹<span id="coAmt">0</span></button>
    </div>
  </div>

  <!-- New game: shown after round ends -->
  <button class="mbtn newgame-btn" id="newgameBtn" style="display:none;" onclick="resetGame()">↩ New Game</button>

</div>

<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const API='', token=localStorage.getItem('cw_token');
if(!token) location.href='login.html';

const LEVEL_DATA = {
  1: { mults:[1.00,1.20,1.44,1.73,2.07,2.49,2.99,3.58,4.30,5.16,6.20],  label:'6.20×',  color:'#00d68f' },
  2: { mults:[1.00,2.00,4.00,7.00,12.00,20.00,35.00,60.00,100.00,170.00,280.00], label:'280×', color:'#ffd84d' },
  3: { mults:[1.00,3.00,8.00,20.00,50.00,120.00,280.00,650.00,1500.00,3500.00,8000.00], label:'8000×', color:'#ff8c42' },
  4: { mults:[1.00,5.00,18.00,60.00,200.00,650.00,2000.00,6000.00,18000.00,50000.00,150000.00], label:'150000×', color:'#ff4444' },
};
let selectedLevel = 1;
let MULTS = LEVEL_DATA[1].mults;
const TOTAL=10;
const CARS=['🚗','🚕','🚙','🚌','🏎','🚓','🚑','🚐'];

let wallet=0, gameActive=false, currentStep=0, betAmount=100;
let laneHeight=46, roadHeight=460;

function setLevel(lvl) {
  selectedLevel = lvl;
  MULTS = LEVEL_DATA[lvl].mults;
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.toggle('sel', parseInt(b.dataset.lvl) === lvl));
  const ld = LEVEL_DATA[lvl];
  document.querySelector('.dest-txt').textContent = `FINISH — ${ld.label}`;
  document.querySelector('.dest-txt').style.color = ld.color;
  buildRoad();
  updateStats(0, MULTS[0]);
}

function buildRoad(){
  const road=document.getElementById('road');
  const lanesC=document.getElementById('lanesContainer');
  const dashesC=document.getElementById('dashesContainer');
  const multLabels=document.getElementById('multLabels');
  roadHeight=road.offsetHeight||420;
  laneHeight=Math.min(52,Math.floor((roadHeight-8)/TOTAL));

  lanesC.innerHTML=''; dashesC.innerHTML=''; multLabels.innerHTML='';

  for(let i=1;i<=TOTAL;i++){
    const bottom=(i-1)*laneHeight;

    const lane=document.createElement('div');
    lane.className='lane';
    lane.id='lane'+i;
    lane.style.cssText=`bottom:${bottom}px;height:${laneHeight}px;`;

    const numCars=i<4?1:2;
    const goLeft=i%2===0;
    const speed=2.5+Math.random()*2.5;

    for(let c=0;c<numCars;c++){
      const car=document.createElement('span');
      car.className='car '+(goLeft?'go-left':'go-right');
      car.textContent=CARS[Math.floor(Math.random()*CARS.length)];
      const dur=(speed+c*1.6).toFixed(1);
      const delay=(-Math.random()*parseFloat(dur)).toFixed(1);
      const sz=Math.max(18,Math.min(28,laneHeight-10));
      car.style.cssText=`font-size:${sz}px;top:50%;transform:translateY(-50%) scaleX(${goLeft?-1:1});animation-duration:${dur}s;animation-delay:${delay}s;`;
      lane.appendChild(car);
    }
    lanesC.appendChild(lane);

    const dash=document.createElement('div');
    dash.className='lane-dash';
    dash.style.bottom=bottom+'px';
    dashesC.appendChild(dash);

    const ml=document.createElement('div');
    ml.className='ml-item';
    ml.style.height=laneHeight+'px';
    const badge=document.createElement('div');
    badge.className='ml-badge';
    badge.id='mlb'+i;
    badge.textContent=MULTS[i]+'×';
    ml.appendChild(badge);
    multLabels.appendChild(ml);
  }
  // Restore chicken position
  moveChicken(currentStep, false);
}

window.addEventListener('load',()=>{buildRoad();updateStats(0,MULTS[0]);});
window.addEventListener('resize',buildRoad);

function getLaneBottom(step){
  if(step===0) return 6;
  return (step-1)*laneHeight + laneHeight/2 - 18;
}

function moveChicken(step, animate=true){
  const wrap=document.getElementById('chickenWrap');
  if(animate){
    wrap.classList.add('jump');
    setTimeout(()=>wrap.classList.remove('jump'),420);
  }
  wrap.style.bottom=getLaneBottom(step)+'px';
}

function setLaneState(step,state){
  const lane=document.getElementById('lane'+step);
  if(lane) lane.className='lane'+(state==='passed'?' passed':state==='active'?' active':state==='next-lane'?' next-lane':'');
  const badge=document.getElementById('mlb'+step);
  if(badge) badge.className='ml-badge'+(state==='passed'?' done':state==='active'?' current':state==='next-lane'?' next':'');
}

function updateStats(step,mult){
  document.getElementById('multVal').textContent=parseFloat(mult).toFixed(2)+'×';
  const el=document.getElementById('multVal');
  el.style.color=mult<3?'var(--green)':mult<8?'var(--yellow)':'var(--orange)';
  document.getElementById('stepVal').textContent=step+' / '+TOTAL;
  const win=(betAmount*mult).toFixed(2);
  document.getElementById('winVal').textContent='₹'+win;
  document.getElementById('coAmt').textContent=win;
}

function sa(v){
  betAmount=v;
  document.getElementById('betAmt').value=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('sel',parseFloat(c.textContent.replace('₹',''))===v));
}

function adjBet(factor){
  let v=parseFloat(document.getElementById('betAmt').value)||100;
  v=Math.max(10,Math.round(v*factor));
  document.getElementById('betAmt').value=v;
  betAmount=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
}

function updateWallet(v){wallet=v;document.getElementById('walletAmt').textContent=parseFloat(v).toFixed(2);}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

function showResult(type,icon,title,amount){
  const ov=document.getElementById('resultOverlay');
  ov.classList.add('show');
  document.getElementById('resCard').className='res-card '+type;
  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resAmt').textContent=amount;
}

function setGameMode(mode){
  document.getElementById('setupSection').style.display=mode==='setup'?'block':'none';
  document.getElementById('gameSection').style.display=mode==='game'?'block':'none';
  document.getElementById('newgameBtn').style.display=mode==='newgame'?'block':'none';
  if(mode==='game'){
    document.getElementById('jumpBtn').style.display='block';
    document.getElementById('cashoutBtn').style.display='none';
  }
}

async function startGame(){
  betAmount=parseFloat(document.getElementById('betAmt').value)||100;
  if(betAmount<10){showToast('Min ₹10');return;}
  if(betAmount>wallet){showToast('Insufficient balance');return;}
  const btn=document.getElementById('startBtn');
  btn.disabled=true; btn.textContent='Starting…';
  try{
    const r=await fetch(API+'/api/chicken/start',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({amount:betAmount,level:selectedLevel})});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;btn.innerHTML='<span class="start-btn-icon">🐔</span> Start Game';return;}
    updateWallet(d.newBalance);
    gameActive=true; currentStep=0;
    document.getElementById('resultOverlay').classList.remove('show');
    document.getElementById('explosion').style.display='none';
    document.getElementById('chickenSprite').textContent='🐔';
    document.getElementById('chickenWrap').className='chicken-wrap';
    moveChicken(0,false);
    for(let i=1;i<=TOTAL;i++) setLaneState(i,'');
    setLaneState(1,'next-lane');
    setGameMode('game');
    updateStats(0,MULTS[0]);
  }catch{showToast('Error');btn.disabled=false;btn.innerHTML='<span class="start-btn-icon">🐔</span> Start Game';}
}

async function doJump(){
  if(!gameActive) return;
  const btn=document.getElementById('jumpBtn');
  btn.disabled=true;
  try{
    const r=await fetch(API+'/api/chicken/jump',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;return;}

    if(d.result==='burned'){
      moveChicken(d.step,true);
      setLaneState(d.step,'active');
      setTimeout(()=>{
        document.getElementById('chickenWrap').className='chicken-wrap dead';
        const exp=document.getElementById('explosion');
        exp.style.display='block';
        exp.style.bottom=getLaneBottom(d.step)+'px';
        setTimeout(()=>exp.style.display='none',600);
      },200);
      gameActive=false;
      setTimeout(()=>{
        showResult('lose','💥','Car ne mara!',`Lost ₹${betAmount.toFixed(2)}`);
        setGameMode('newgame');
      },700);
      showToast(`🚗 Lost ₹${betAmount}`);
    } else {
      setLaneState(d.step,'passed');
      moveChicken(d.step,true);
      currentStep=d.step;
      updateStats(d.step, d.multiplier);
      if(d.result==='maxed'){
        gameActive=false;
        updateWallet(d.newBalance);
        setTimeout(()=>{
          showResult('win','🏆',`Finish! ${d.multiplier}×`,`+₹${parseFloat(d.win).toFixed(2)}`);
          setGameMode('newgame');
        },500);
        showToast(`🎉 Won ₹${d.win}!`);
        showWinAnimation(d.win,'Chicken Road Win!');
      } else {
        setLaneState(d.step+1,'next-lane');
        btn.disabled=false;
        document.getElementById('cashoutBtn').style.display='block';
      }
    }
  }catch{showToast('Error');btn.disabled=false;}
}

async function doCashout(){
  if(!gameActive) return;
  const btn=document.getElementById('cashoutBtn');
  btn.disabled=true;
  try{
    const r=await fetch(API+'/api/chicken/cashout',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}});
    const d=await r.json();
    if(!r.ok){showToast(d.error||'Failed');btn.disabled=false;return;}
    updateWallet(d.newBalance);
    gameActive=false;
    setTimeout(()=>{
      showResult('win','💰','Safe!',`+₹${parseFloat(d.win).toFixed(2)} (${d.multiplier}×)`);
      setGameMode('newgame');
    },300);
    showToast(`💰 Won ₹${d.win} at ${d.multiplier}×!`);
    showWinAnimation(d.win,'Chicken Road Win!');
  }catch{showToast('Error');btn.disabled=false;}
}

function resetGame(){
  gameActive=false; currentStep=0;
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('chickenWrap').className='chicken-wrap';
  document.getElementById('chickenSprite').textContent='🐔';
  document.getElementById('explosion').style.display='none';
  moveChicken(0,false);
  for(let i=1;i<=TOTAL;i++) setLaneState(i,'');
  setLaneState(1,'next-lane');
  setGameMode('setup');
  document.getElementById('startBtn').disabled=false;
  document.getElementById('startBtn').innerHTML='<span class="start-btn-icon">🐔</span> Start Game';
  updateStats(0,MULTS[0]);
}

async function init(){
  try{
    const r=await fetch(API+'/api/auth/me',{headers:{Authorization:'Bearer '+token}});
    if(!r.ok){localStorage.removeItem('cw_token');location.href='login.html';return;}
    updateWallet((await r.json()).user.wallet);
  }catch{}
  try{
    const r=await fetch(API+'/api/chicken/state',{headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    if(d.active){
      betAmount=d.amount; currentStep=d.step; gameActive=true;
      if(d.level) { selectedLevel=d.level; MULTS=LEVEL_DATA[d.level].mults; }
      document.getElementById('betAmt').value=betAmount;
      for(let i=1;i<=d.step;i++) setLaneState(i,'passed');
      if(d.step<TOTAL) setLaneState(d.step+1,'next-lane');
      moveChicken(d.step,false);
      setGameMode('game');
      document.getElementById('cashoutBtn').style.display=d.step>0?'block':'none';
      updateStats(d.step,d.multiplier);
    }
  }catch{}
}

const socket=io();
socket.on('wallet:update',d=>updateWallet(d.wallet));
init();

// ── Win Animation ──
let _confettiFrame=null;
const _confettiColors=['#ffd84d','#ff4d6a','#5b8fff','#00d68f','#9b59ff','#ff8c42','#fff','#ff69b4'];
function showWinAnimation(amount,label){
  let ov=document.getElementById('winOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='winOverlay';
    ov.innerHTML=`<canvas id="winCanvas"></canvas><div class="win-center"><span class="win-emoji">🎉</span><div class="win-title">CONGRATULATIONS!</div><div class="win-amount" id="winAmt">+₹0</div><div class="win-label" id="winLbl">Amazing win!</div><span class="win-stars">⭐✨⭐</span><div class="win-tap">Tap anywhere to continue</div></div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click',hideWinAnimation);
  }
  document.getElementById('winAmt').textContent='+₹'+parseFloat(amount).toFixed(2);
  document.getElementById('winLbl').textContent=label||'Amazing win!';
  ov.classList.add('show');
  _startConfetti();
  clearTimeout(ov._t);
  ov._t=setTimeout(hideWinAnimation,5000);
}
function hideWinAnimation(){
  const ov=document.getElementById('winOverlay');
  if(!ov||!ov.classList.contains('show'))return;
  ov.style.animation='wOvOut .3s ease forwards';
  setTimeout(()=>{ov.classList.remove('show');ov.style.animation='';},300);
  _stopConfetti();
}
function _startConfetti(){
  const canvas=document.getElementById('winCanvas');if(!canvas)return;
  const ctx2=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=[];
  for(let i=0;i<150;i++){pieces.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,w:7+Math.random()*10,h:4+Math.random()*6,color:_confettiColors[Math.floor(Math.random()*_confettiColors.length)],speed:2+Math.random()*5,angle:Math.random()*360,spin:(Math.random()-.5)*10,swingA:Math.random()*Math.PI*2,swingS:0.02+Math.random()*.04,swing:Math.random()*3-1.5});}
  function draw(){ctx2.clearRect(0,0,canvas.width,canvas.height);let alive=false;pieces.forEach(p=>{p.y+=p.speed;p.angle+=p.spin;p.swingA+=p.swingS;p.x+=Math.sin(p.swingA)*p.swing;if(p.y<canvas.height+30)alive=true;ctx2.save();ctx2.translate(p.x,p.y);ctx2.rotate(p.angle*Math.PI/180);ctx2.fillStyle=p.color;ctx2.globalAlpha=Math.max(0,1-(p.y/canvas.height)*.4);ctx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx2.restore();});if(alive)_confettiFrame=requestAnimationFrame(draw);}
  cancelAnimationFrame(_confettiFrame);_confettiFrame=requestAnimationFrame(draw);
}
function _stopConfetti(){cancelAnimationFrame(_confettiFrame);const canvas=document.getElementById('winCanvas');if(canvas)canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);}
</script>
